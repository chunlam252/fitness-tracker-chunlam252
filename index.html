<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FitTrack 運動日常</title>
  <meta name="description" content="一個全功能的運動追蹤應用程式">
  
  <!-- PWA & Mobile Settings -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FitTrack">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      overscroll-behavior-x: none;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-slow { animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    /* iPhone Safe Area Fix */
    .safe-area-pt { padding-top: max(1.5rem, env(safe-area-inset-top)); }
    .safe-area-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Markdown Styles for AI Coach */
    .prose p { margin-bottom: 0.5rem; line-height: 1.6; }
    .prose p:last-child { margin-bottom: 0; }
    .prose strong { font-weight: 800; color: #fff; }
    .prose ul { list-style-type: disc; padding-left: 1.2rem; margin-bottom: 0.8rem; }
    .prose ol { list-style-type: decimal; padding-left: 1.2rem; margin-bottom: 0.8rem; }
    .prose li { margin-bottom: 0.25rem; }
    
    /* Table Styles */
    .prose table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.75rem; table-layout: fixed; }
    .prose th { text-align: left; padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.3); font-weight: 800; color: rgba(255,255,255,0.9); }
    .prose td { padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); vertical-align: top; color: rgba(255,255,255,0.8); word-wrap: break-word; }
    .prose tr:last-child td { border-bottom: none; }
    
    /* Headings in Markdown */
    .prose h1, .prose h2, .prose h3 { font-weight: 800; margin-top: 1rem; margin-bottom: 0.5rem; color: #fff; }
  </style>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  
  <!-- Import Map -->
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "@google/genai": "https://esm.run/@google/genai",
    "marked": "https://esm.sh/marked@12.0.0",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import ReactDOM from 'react-dom/client';
    import { initializeApp, getApps, getApp } from 'firebase/app';
    import { getFirestore, doc, setDoc, onSnapshot, getDoc } from 'firebase/firestore';
    import { getAuth, onAuthStateChanged, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, GoogleAuthProvider } from 'firebase/auth';
    import { GoogleGenAI } from "@google/genai";
    import { parse } from "marked";

    const GEMINI_API_KEY = "AIzaSyAGe1-HT-X-SkbAkcFIvGr3cFr9EEYcxcQ";

    const CATEGORIES = [
      { value: 'Gym', subcategories: ['功能性訓練', '重量訓練', '帶氧運動', 'HIIT', '伸展'], color: 'bg-blue-500', text: 'text-blue-500', icon: '💪' },
      { value: '羽毛球', subcategories: ['街場/Drop-in/Friendly', '技術練習', '正式比賽'], color: 'bg-green-500', text: 'text-green-500', icon: '🏸' },
      { value: '排球', subcategories: ['打比賽', '隊訓', '街場/Drop-in/Friendly', '技術訓練'], color: 'bg-orange-500', text: 'text-orange-500', icon: '🏐' },
      { value: '足球', subcategories: ['4v4', '5v5', '7v7', '11v11'], color: 'bg-emerald-500', text: 'text-emerald-500', icon: '⚽' },
      { value: '跑步', subcategories: ['慢跑', '長跑', '衝刺練習', '馬拉松訓練'], color: 'bg-red-500', text: 'text-red-500', icon: '🏃' },
      { value: '拉筋', subcategories: ['晨間伸展', '睡前放鬆', '運動後拉筋', '滾筒放鬆', '動態伸展'], color: 'bg-indigo-500', text: 'text-indigo-500', icon: '🤸' },
      { value: '其他', subcategories: ['自定義項目'], color: 'bg-slate-500', text: 'text-slate-500', icon: '✨' },
    ];

    const firebaseConfig = {
      apiKey: "AIzaSyCxrAn6x69Ki4c-MTrpBhyGnX2XFKW2f4k",
      authDomain: "fittracker-chunlam252.firebaseapp.com",
      projectId: "fittracker-chunlam252",
      storageBucket: "fittracker-chunlam252.firebasestorage.app",
      messagingSenderId: "629880531604",
      appId: "1:629880531604:web:76fd44292a79fbdad86281"
    };

    const STORAGE_KEY = 'fittrack_logs_v2'; 
    const AI_CACHE_KEY = 'fittrack_ai_advice_cache';
    
    // --- HELPER ---
    const getLocalTodayString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    const isFutureDate = (dateStr) => {
      const today = new Date();
      today.setHours(0,0,0,0);
      const target = new Date(dateStr);
      return target > today; 
    };

    const calculateDuration = (start, end) => {
      if (!start || !end) return 0;
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      let diff = (eh * 60 + em) - (sh * 60 + sm);
      if (diff < 0) diff += 24 * 60; // Handle overnight
      return diff;
    };

    const initFirebase = () => {
      try {
        const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
        return { auth: getAuth(app), db: getFirestore(app) };
      } catch (e) { console.error("Firebase init error:", e); return null; }
    };

    // --- AI COMPONENT (Collapsible & Alien Icon) ---
    const SmartCoach = ({ advice, loading, onRefresh, logs }) => {
      const [expanded, setExpanded] = useState(false);
      const [chatInput, setChatInput] = useState('');
      const [chatMessages, setChatMessages] = useState([]);
      const [isChatting, setIsChatting] = useState(false);

      const handleAskAI = async () => {
          if (!chatInput.trim()) return;
          
          const userMsg = chatInput.trim();
          setChatMessages(prev => [...prev, { role: 'user', text: userMsg }]);
          setChatInput('');
          setIsChatting(true);
          
          try {
              const todayStr = getLocalTodayString();
              const history = (logs || [])
                .filter(l => (l.status === 'completed' || !l.status) && l.date <= todayStr) 
                .sort((a,b) => new Date(b.date) - new Date(a.date))
                .slice(0, 14)
                .map(l => `- ${l.date} [${l.category}]: ${l.subcategory} (${l.durationMinutes}min)`);
                
              const futurePlans = (logs || [])
                .filter(l => l.status === 'planned' && l.date > todayStr)
                .sort((a,b) => new Date(a.date) - new Date(b.date))
                .slice(0, 7) 
                .map(l => `- ${l.date} [${l.category}]: ${l.subcategory} (${l.startTime}-${l.endTime})`);

              const prompt = `
                Role: Professional Personal Trainer.
                User's Current Date: ${todayStr}
                
                [Past 14 Days History]:
                ${history.join('\n') || "No recent history."}
                
                [Next 7 Days Plans]:
                ${futurePlans.join('\n') || "No future plans."}
                
                User Question: "${userMsg}"
                
                Task: Answer the user's question based on their exercise history and plans. 
                Respond in Traditional Chinese (HK style). Be concise, encouraging, and professional.
              `;
              
              const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
              let responseText = "";
              try {
                  const response = await ai.models.generateContent({
                      model: "gemini-2.0-flash-exp",
                      contents: prompt,
                  });
                  responseText = response.text;
              } catch (fallbackErr) {
                  console.warn("Fallback model used", fallbackErr);
                  const responseFallback = await ai.models.generateContent({
                      model: "gemini-flash-latest",
                      contents: prompt,
                  });
                  responseText = responseFallback.text;
              }
              
              setChatMessages(prev => [...prev, { role: 'ai', text: responseText }]);
          } catch (error) {
              console.error("Chat AI Error:", error);
              setChatMessages(prev => [...prev, { role: 'ai', text: "抱歉，我暫時無法回答你的問題，請稍後再試。" }]);
          } finally {
              setIsChatting(false);
          }
      };

      // 嚴格分割邏輯
      let part1 = advice || '';
      let part2 = null;

      if (advice && !loading) {
         // 嘗試尋找 "Part 2" 或 "Part 2:" 或 "第二部分"
         const separatorRegex = /(Part 2|第二部分)/i;
         const match = advice.match(separatorRegex);
         
         if (match && match.index > 10) {
             // 找到分割點
             part1 = advice.substring(0, match.index).trim();
             // 清理 Part 1 尾部可能多餘的分隔線
             part1 = part1.replace(/[-_=]{3,}$/gm, '').trim();
             
             part2 = advice.substring(match.index).trim();
         } else if (advice.length > 200) {
             // 沒找到關鍵字，但太長了，強制折疊
             const cutIndex = advice.indexOf('\n', 150); // 在 150 字後找換行
             if (cutIndex !== -1) {
                 part1 = advice.substring(0, cutIndex).trim() + "...";
                 part2 = advice.substring(cutIndex).trim();
             }
         }
      }

      const renderMarkdown = (text) => {
          if (!text) return null;
          // marked.parse returns HTML string
          return { __html: parse(text) };
      };

      return (
        <div className="bg-gradient-to-r from-violet-600 to-indigo-600 rounded-[2rem] p-5 text-white shadow-lg shadow-indigo-200 mb-6 relative overflow-hidden transition-all duration-300">
          <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
          
          <div className="relative z-10">
             {/* Header */}
             <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3">
                   <div className="w-10 h-10 rounded-2xl bg-white/20 flex items-center justify-center text-2xl backdrop-blur-sm border border-white/10">
                     👽
                   </div>
                   <div className="text-[10px] font-bold text-indigo-100 uppercase tracking-widest flex items-center gap-1">
                     AI 智能教練 <span className="bg-white/20 px-1.5 rounded text-[8px]">GEMINI</span>
                   </div>
                </div>
                <button onClick={onRefresh} disabled={loading} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                   <svg className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
             </div>

             {/* Content */}
             {loading ? (
                <div className="space-y-2 animate-pulse mt-2">
                  <div className="h-3 bg-white/20 rounded-full w-3/4"></div>
                  <div className="h-3 bg-white/20 rounded-full w-1/2"></div>
                </div>
             ) : (
                <div className="prose">
                    <div 
                        className="text-sm font-medium leading-relaxed tracking-wide"
                        dangerouslySetInnerHTML={renderMarkdown(part1)}
                    />
                    
                    {part2 && (
                        <>
                            {expanded && (
                                <div className="mt-4 pt-4 border-t border-white/20 animate-slide-up">
                                    <div className="text-sm font-medium leading-relaxed tracking-wide" dangerouslySetInnerHTML={renderMarkdown(part2)} />
                                    
                                    {/* Chat Section */}
                                    <div className="mt-6 bg-white/10 rounded-2xl p-4">
                                        <h4 className="text-xs font-bold text-indigo-100 uppercase tracking-widest mb-3 flex items-center gap-2">
                                            💬 隨時發問
                                        </h4>
                                        
                                        <div className="space-y-3 mb-3 max-h-60 overflow-y-auto custom-scrollbar pr-1">
                                            {chatMessages.map((msg, idx) => (
                                                <div key={idx} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                                    <div className={`text-sm px-3 py-2 rounded-2xl max-w-[90%] ${msg.role === 'user' ? 'bg-indigo-500 text-white rounded-br-sm' : 'bg-white/20 text-indigo-50 rounded-bl-sm'}`}>
                                                        {msg.role === 'ai' ? <div dangerouslySetInnerHTML={renderMarkdown(msg.text)} className="prose prose-sm prose-invert" /> : msg.text}
                                                    </div>
                                                </div>
                                            ))}
                                            {isChatting && (
                                                <div className="flex items-start">
                                                    <div className="text-sm px-3 py-2 rounded-2xl bg-white/20 text-indigo-50 rounded-bl-sm flex gap-1 items-center">
                                                        <span className="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce"></span>
                                                        <span className="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></span>
                                                        <span className="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div className="flex gap-2">
                                            <input 
                                                type="text" 
                                                value={chatInput}
                                                onChange={e => setChatInput(e.target.value)}
                                                onKeyDown={e => e.key === 'Enter' && handleAskAI()}
                                                placeholder="例如：聽日加操腳好唔好？" 
                                                className="flex-1 bg-white/20 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-indigo-200 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                                            />
                                            <button 
                                                onClick={handleAskAI}
                                                disabled={isChatting || !chatInput.trim()}
                                                className="bg-indigo-500 hover:bg-indigo-400 disabled:opacity-50 text-white p-2 rounded-xl transition-colors flex items-center justify-center"
                                            >
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <button 
                                onClick={() => setExpanded(!expanded)}
                                className="w-full mt-3 py-2 text-[10px] font-bold uppercase tracking-widest bg-white/10 hover:bg-white/20 rounded-xl transition-colors flex items-center justify-center gap-2 group"
                            >
                                {expanded ? (
                                    <span className="flex items-center gap-2">⬆️ 收起每週分析</span>
                                ) : (
                                    <span className="flex items-center gap-2 group-hover:scale-105 transition-transform">⬇️ 查看每週分析與建議</span>
                                )}
                            </button>
                        </>
                    )}
                </div>
             )}
          </div>
        </div>
      );
    };

    // --- MAIN APP COMPONENTS ---

    const Layout = ({ children, activeView, setView, user, status, onAuth }) => {
      const [showPlusMenu, setShowPlusMenu] = React.useState(false);
      return (
        <div className="flex flex-col h-[100dvh] max-w-md mx-auto bg-white shadow-2xl relative overflow-hidden border-x border-slate-100">
          <header className="px-6 pb-4 bg-white/90 backdrop-blur border-b border-slate-100 z-30 flex justify-between items-center shrink-0 safe-area-pt">
            <div>
              <h1 className="text-xl font-black text-slate-800 tracking-tight flex items-center gap-2">
                FitTrack
              </h1>
              <div className="flex items-center gap-1.5 mt-1">
                <div className={`w-1.5 h-1.5 rounded-full ${status.includes('連線') || status.includes('同步') ? 'bg-green-500' : (status.includes('錯') ? 'bg-red-500' : 'bg-slate-300')}`}></div>
                <p className="text-[9px] font-bold text-slate-400">{status}</p>
              </div>
            </div>
            <button onClick={() => setView('settings')} className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-slate-100 transition-colors">
              {user?.photoURL ?
                <img src={user.photoURL} className="w-full h-full rounded-full object-cover border border-slate-200" alt="user" /> :
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              }
            </button>
          </header>
          <main className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50 relative" onClick={()=>showPlusMenu && setShowPlusMenu(false)}>{children}</main>
          <nav className="shrink-0 bg-white border-t border-slate-100 grid grid-cols-5 items-end pb-6 pt-2 px-2 z-30 safe-area-pb shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] relative">
            {showPlusMenu && (
              <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 flex gap-2 z-40">
                <button onClick={()=>{setShowPlusMenu(false); setView('weekplanner');}}
                  className="flex flex-col items-center gap-1 bg-white rounded-2xl shadow-xl border px-4 py-3 active:scale-95 transition-all">
                  <span className="text-2xl">📅</span>
                  <span className="text-[10px] font-bold text-slate-700 whitespace-nowrap">週計劃</span>
                </button>
                <button onClick={()=>{setShowPlusMenu(false); setView('add');}}
                  className="flex flex-col items-center gap-1 bg-white rounded-2xl shadow-xl border px-4 py-3 active:scale-95 transition-all">
                  <span className="text-2xl">✍️</span>
                  <span className="text-[10px] font-bold text-slate-700 whitespace-nowrap">單次紀錄</span>
                </button>
              </div>
            )}
            <NavBtn active={activeView === 'dashboard'} onClick={() => setView('dashboard')} icon="home" label="主頁" />
            <NavBtn active={activeView === 'trends'} onClick={() => setView('trends')} icon="chart" label="統計" />
            <div className="flex justify-center -mt-12 relative z-10 pointer-events-none">
              <button onClick={() => setShowPlusMenu(p => !p)} className="pointer-events-auto flex flex-col items-center group active:scale-95 transition-transform">
                <div className={`w-16 h-16 rounded-full flex items-center justify-center text-white shadow-xl border-[6px] border-white ring-1 ring-slate-100 transition-all ${showPlusMenu ? 'bg-slate-700 shadow-slate-200' : 'bg-blue-600 shadow-blue-200'}`}>
                  <span className="text-2xl" style={{transform: showPlusMenu ? 'rotate(45deg)' : 'none', display:'inline-block', transition:'transform 0.2s'}}>+</span>
                </div>
                <span className="text-[10px] font-bold text-blue-600 mt-1">紀錄</span>
              </button>
            </div>
            <NavBtn active={activeView === 'calendar'} onClick={() => setView('calendar')} icon="calendar" label="日曆" />
            <NavBtn active={activeView === 'friends'} onClick={() => setView('friends')} icon="users" label="好友" />
          </nav>
        </div>
      );
    };

    const NavBtn = ({ active, onClick, icon, label }) => {
      const icons = {
        home: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
        chart: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
        calendar: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
        users: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
      };
      return (

    const Dashboard = ({ logs, onEdit, setView, aiAdvice, aiLoading, onRefreshAi, onMarkDone, onRepeat }) => {

      const sorted = [...logs].sort((a,b) => {
        return new Date(b.date) - new Date(a.date);
      });

      const now = new Date();
      const thisWeekCount = completedLogs.filter(l => {
        const d = new Date(l.date.replace(/-/g, '/'));
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - now.getDay());
        startOfWeek.setHours(0,0,0,0);
        return d >= startOfWeek;
      }).length;
      
      const last5 = completedLogs.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
      const moodMap = { '🤩': 5, '😊': 4, '😐': 3, '😫': 2, '😡': 1 };
      let moodText = '暫無';
      if(last5.length > 0) {
        const total = last5.reduce((acc, l) => acc + (moodMap[l.mood] || 3), 0);
        const avg = total / last5.length;
        if (avg >= 4.5) moodText = '🤩 絕佳';
        else if (avg >= 3.5) moodText = '😊 不錯';
        else if (avg >= 2.5) moodText = '😐 普通';
        else if (avg >= 1.5) moodText = '😫 疲累';
        else moodText = '😡 糟糕';
      }

      const todayStr = getLocalTodayString();
      const todayPlanned = logs.filter(l => l.date === todayStr && l.status === 'planned');
      const lastCompleted = completedLogs.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

      return (
        <div className="p-6 space-y-6 animate-slide-up pb-24">

          <div className="bg-gradient-to-br from-blue-600 to-blue-500 rounded-3xl p-5 text-white shadow-xl shadow-blue-200">
            {todayPlanned.length > 0 ? (
              <>
                <div className="text-[10px] font-black uppercase tracking-widest opacity-70 mb-3">📅 今日計劃</div>
                <div className="space-y-3">
                  {todayPlanned.map(l => {
                    const cat = CATEGORIES.find(c=>c.value===l.category)||CATEGORIES[0];
                    return (
                      <div key={l.id} className="flex items-center justify-between">

                            <div className="font-bold text-sm">{l.subcategory}</div>

                          </div>

                        <button onClick={()=>onMarkDone(l.id)} className="bg-white text-blue-600 font-black text-xs px-3 py-2 rounded-xl active:scale-95 transition-transform shadow-sm">✅ 完成</button>
                      </div>

                </div>
              </>
            ) : lastCompleted ? (
              <>
                <div className="text-[10px] font-black uppercase tracking-widest opacity-70 mb-3">🔁 上次訓練</div>

                    <div>
                      <div className="font-bold text-sm">{lastCompleted.subcategory}</div>
                      <div className="text-xs opacity-70">{lastCompleted.date} · {lastCompleted.durationMinutes}min</div>

                  </div>
                  <button onClick={()=>onRepeat(lastCompleted)} className="bg-white text-blue-600 font-black text-xs px-3 py-2 rounded-xl active:scale-95 transition-transform shadow-sm">再做一次</button>

              <div className="text-center py-2 opacity-80 text-sm font-bold">按 + 開始今日訓練 💪</div>

               <div className="text-3xl font-black text-slate-800">{thisWeekCount}<span className="text-sm font-bold text-slate-400 ml-1">次</span></div>
             </div>
             <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between h-28">
               <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">近期心情</div>
               <div className="text-lg font-black text-slate-800">{moodText}</div>
             </div>
          </div>

          <div>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">最近行程</h3>
              <button onClick={()=>setView('calendar')} className="text-xs font-bold text-blue-600">查看日曆</button>
            </div>
            <div className="space-y-3">
              {sorted.slice(0, 10).map(l => {
                const c = CATEGORIES.find(x=>x.value===l.category) || CATEGORIES[5];
                const isPlanned = l.status === 'planned';
                
                return (

    const Trends = ({ logs }) => {

      const completed = logs.filter(l => l.status === 'completed' || !l.status);
      const [filter, setFilter] = useState('month'); // 'all', 'month', 'year'

      const [viewMonth, setViewMonth] = useState(new Date());

      // Filter Logic for Breakdown and Totals
      const now = new Date();
      const filteredLogs = completed.filter(l => {
         const d = new Date(l.date.replace(/-/g, '/'));
         if (filter === 'month') return d.getMonth() === viewMonth.getMonth() && d.getFullYear() === viewMonth.getFullYear();
         if (filter === 'year') return d.getFullYear() === now.getFullYear();
         return true;
      });

      // Recalculate Totals based on Filter
      const totalMins = filteredLogs.reduce((a,b) => a + (b.durationMinutes||0), 0);
      const totalCount = filteredLogs.length;

      // Last 7 days (Keep as is, showing recent activity regardless of filter)
      const last7 = Array.from({length:7}).map((_,i) => {
        const d = new Date(); 
        d.setDate(d.getDate() - (6-i));
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        // Note: We use 'completed' here (all time) for the trend chart, or should it respect filter?
        // UX: Typically "Recent Trend" is "Recent", so it shouldn't be affected by "Month/Year" filter which applies to aggregates.
        const mins = completed.filter(l=>l.date === dateStr).reduce((a,b)=>a+(b.durationMinutes||0),0);
        return { day: d.getDate(), mins, isToday: i===6 };
      });
      const maxWeekly = Math.max(...last7.map(d=>d.mins), 60);

      // Breakdown based on Filtered Logs
      const breakdown = CATEGORIES.map(cat => {
        const catLogs = filteredLogs.filter(l => l.category === cat.value);
        const totalMinutes = catLogs.reduce((a,b)=>a+(b.durationMinutes||0), 0);
        return { ...cat, totalMinutes, count: catLogs.length, hours: (totalMinutes/60).toFixed(1) };
      }).filter(c => c.totalMinutes > 0).sort((a,b) => b.totalMinutes - a.totalMinutes);

      // 找出最大值，用於計算進度條的「相對比例」 (最大值為 100% 寬度)
      const maxCatMinutes = breakdown.length > 0 ? breakdown[0].totalMinutes : 0;

      const FilterBtn = ({ val, label }) => (
          <button 
            onClick={() => setFilter(val)}
            className={`flex-1 py-2 text-[10px] font-bold rounded-xl transition-all ${filter === val ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}
          >
            {label}
          </button>
      );

      if (selectedCategory) {
          const catData = CATEGORIES.find(c => c.value === selectedCategory) || { icon: '✨', value: selectedCategory };
          const catLogs = filteredLogs.filter(l => l.category === selectedCategory);
          const last5Logs = catLogs.sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
          
          // Partner stats
          const partnerStats = {};
          catLogs.forEach(l => {
              if(l.friends) l.friends.forEach(f => {
                  partnerStats[f] = (partnerStats[f] || 0) + 1;
              });
          });
          const topPartners = Object.entries(partnerStats).sort((a,b)=>b[1]-a[1]);

          // Notes
          const logsWithNotes = catLogs.filter(l => l.notes?.trim() || l.improvement?.trim());

          return (
             <div className="p-6 space-y-6 animate-slide-up pb-24">
                <div className="flex items-center gap-4 mb-2">
                    <button onClick={() => setSelectedCategory(null)} className="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-600 shadow-sm active:scale-95 transition-transform">
                        ←
                    </button>
                    <div>
                        <h2 className="text-xl font-black text-slate-800 flex items-center gap-2">
                            <span>{catData.icon}</span> {selectedCategory}
                        </h2>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{filter === 'all' ? '全部' : filter === 'month' ? '本月' : '本年'}統計</p>
                    </div>
                </div>

                <div className="grid grid-cols-2 gap-3 mb-2">
                     <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                        <div className="text-[10px] font-black text-slate-400 uppercase">累積次數</div>
                        <div className="text-xl font-black text-slate-800 mt-1">{catLogs.length}</div>
                     </div>
                     <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                        <div className="text-[10px] font-black text-slate-400 uppercase">總時數</div>
                        <div className="text-xl font-black text-slate-800 mt-1">{(catLogs.reduce((a,b)=>a+(b.durationMinutes||0),0)/60).toFixed(1)} <span className="text-xs">hr</span></div>
                     </div>
                </div>

                {/* Section 1: Last 5 Moods */}
                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                    <h3 className="text-xs font-black text-slate-400 uppercase mb-3 text-center">最近 5 次心情</h3>
                    {last5Logs.length > 0 ? (
                        <div className="flex justify-around items-end gap-2">
                            {last5Logs.map((l, i) => (
                                <div key={i} className="flex flex-col items-center gap-2">
                                    <div className="text-2xl">{l.mood || '😐'}</div>
                                    <div className="text-[9px] font-bold text-slate-400">{l.date.slice(5).replace('-','/')}</div>
                                </div>
                            ))}
                            {/* Fill empty spots if less than 5 */}
                            {Array.from({length: 5 - last5Logs.length}).map((_, i) => (
                                <div key={`empty-${i}`} className="flex flex-col items-center gap-2 opacity-20">
                                    <div className="text-2xl">⚪</div>
                                    <div className="text-[9px] font-bold text-slate-400">---</div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="text-xs text-slate-400 text-center py-4">暫無紀錄</div>
                    )}
                </div>

                {/* Section 2: Notes & Tech Notes */}
                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                     <h3 className="text-xs font-black text-slate-400 uppercase mb-3">重點備忘 & 技術筆記</h3>
                     <div className="space-y-3 max-h-64 overflow-y-auto custom-scrollbar pr-2">
                         {logsWithNotes.length > 0 ? (
                             logsWithNotes.map((l, i) => (
                                 <div key={i} className="border-b border-slate-50 pb-3 last:border-0 last:pb-0">
                                     <div className="text-[10px] font-bold text-slate-400 mb-1">{l.date} - {l.subcategory}</div>
                                     {l.notes?.trim() && <div className="text-sm text-slate-700 bg-slate-50 p-2 rounded-lg mb-1"><span className="text-[10px] font-bold text-blue-500 mr-1">📝 備忘:</span>{l.notes}</div>}
                                     {l.improvement?.trim() && <div className="text-sm text-slate-700 bg-red-50 p-2 rounded-lg"><span className="text-[10px] font-bold text-red-500 mr-1">🎯 改善:</span>{l.improvement}</div>}
                                 </div>
                             ))
                         ) : (
                             <div className="text-xs text-slate-400 text-center py-4">此時段無備忘紀錄</div>
                         )}
                     </div>
                </div>

                {/* Section 3: Top Partners */}
                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                     <h3 className="text-xs font-black text-slate-400 uppercase mb-3">最佳同行夥伴</h3>
                     <div className="space-y-2">
                         {topPartners.length > 0 ? (
                             topPartners.map(([name, count], i) => (
                                 <div key={name} className="flex items-center justify-between p-2 rounded-xl transition-colors bg-slate-50">
                                     <div className="flex items-center gap-3">
                                         <div className="w-8 h-8 rounded-full bg-white text-slate-500 flex items-center justify-center font-black text-xs uppercase shadow-sm">{i===0?'👑':name[0]}</div>
                                         <div className="font-bold text-sm text-slate-800">{name}</div>
                                     </div>
                                     <div className="text-xs font-bold text-slate-400">{count} 次</div>
                                 </div>
                             ))
                         ) : (
                             <div className="text-xs text-slate-400 text-center py-4">此時段無夥伴紀錄</div>
                         )}
                     </div>
                </div>
             </div>
          );
      }

      const topCat = breakdown[0];
      const isCurrentMonth = viewMonth.getMonth() === now.getMonth() && viewMonth.getFullYear() === now.getFullYear();

      return (
        <div className="p-6 space-y-6 animate-slide-up pb-24">

          <div className="flex bg-slate-50 p-1 rounded-2xl">
             <FilterBtn val="month" label="月份" />
             <FilterBtn val="year" label="本年" />
             <FilterBtn val="all" label="全部" />
          </div>

          {filter === 'month' && (
            <div className="flex items-center justify-between bg-white px-4 py-3 rounded-2xl border border-slate-100 shadow-sm">
              <button onClick={()=>setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth()-1, 1))} className="w-8 h-8 flex items-center justify-center rounded-xl bg-slate-50 text-slate-500 font-bold">←</button>
              <span className="font-black text-sm text-slate-700">{viewMonth.toLocaleString('zh-HK',{month:'long',year:'numeric'})}</span>
              <button onClick={()=>setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth()+1, 1))} disabled={isCurrentMonth} className={`w-8 h-8 flex items-center justify-center rounded-xl font-bold ${isCurrentMonth ? 'text-slate-200' : 'bg-slate-50 text-slate-500'}`}>→</button>
            </div>
          )}

          <section className="grid grid-cols-3 gap-3">
             <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                <div className="text-[10px] font-black text-slate-400 uppercase">總時數</div>
                <div className="text-xl font-black text-slate-800 mt-1">{(totalMins/60).toFixed(1)}<span className="text-xs text-slate-400 ml-1">hr</span></div>
             </div>
             <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                <div className="text-[10px] font-black text-slate-400 uppercase">完成次數</div>
                <div className="text-xl font-black text-slate-800 mt-1">{totalCount}<span className="text-xs text-slate-400 ml-1">次</span></div>
             </div>
             <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                <div className="text-[10px] font-black text-slate-400 uppercase">最常做</div>
                <div className="text-xl font-black text-slate-800 mt-1">{topCat ? topCat.icon : '—'}</div>
                <div className="text-[9px] font-bold text-slate-400 mt-0.5 truncate">{topCat ? topCat.value : '暫無'}</div>
             </div>
          </section>

          <section>
            <h3 className="text-sm font-black text-slate-800 mb-4 uppercase tracking-widest">過去 7 天趨勢</h3>
            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 h-48 flex items-end justify-between gap-2">
               {last7.map((d,i) => (
                 <div key={i} className="flex-1 flex flex-col items-center gap-1 h-full justify-end group">
                   <div style={{height: `${d.mins > 0 ? Math.max((d.mins/maxWeekly)*100, 5) : 2}%`}} className={`w-full max-w-[12px] rounded-full min-h-[4px] transition-all duration-500 ${d.isToday ? 'bg-blue-500' : (d.mins > 0 ? 'bg-blue-200' : 'bg-slate-100')}`}></div>
                   <span className="text-[10px] font-bold text-slate-400 mt-1">{d.day}</span>
                 </div>
               ))}
            </div>
          </section>

          <section>
               <h3 className="text-sm font-black text-slate-800 mb-4 uppercase tracking-widest">項目分佈 <span className="text-[10px] font-normal text-slate-400 lowercase ml-1">(點擊查看詳情)</span></h3>
               {breakdown.length > 0 ? (
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                 {breakdown.map((item) => {
                   const percentage = totalMins > 0 ? Math.round((item.totalMinutes / totalMins) * 100) : 0;
                   const barWidth = maxCatMinutes > 0 ? (item.totalMinutes / maxCatMinutes) * 100 : 0;

                   return (
                     <div key={item.value} onClick={() => setSelectedCategory(item.value)} className="cursor-pointer group active:scale-[0.98] transition-all p-3 -mx-3 rounded-2xl hover:bg-slate-50 border border-transparent hover:border-slate-100">
                       <div className="flex justify-between items-end mb-1">
                         <div className="flex items-center gap-2">
                           <span className="text-lg">{item.icon}</span>
                           <span className="text-xs font-bold text-slate-700">{item.value}</span>
                         </div>
                         <div className="text-[10px] font-bold text-slate-400">
                           {item.count} 次 • {item.hours} hr <span className="text-slate-300 mx-1">|</span> <span className="text-blue-500">{percentage}%</span>
                         </div>
                       </div>
                       <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                         <div className={`h-full ${item.color}`} style={{width: `${barWidth}%`}}></div>
                       </div>
                     </div>
                   );
                 })}
               </div>
               ) : (
                   <div className="text-center py-8 text-slate-400 text-xs">此時段無運動紀錄</div>
               )}
          </section>
        </div>
      );
    }

    const Calendar = ({ logs, onEdit }) => {
      const [date, setDate] = useState(new Date());
      const [sel, setSel] = useState(getLocalTodayString());

      const daysInMonth = new Date(date.getFullYear(), date.getMonth()+1, 0).getDate();
      const firstDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
      const days = Array(firstDay).fill(null).concat([...Array(daysInMonth).keys()].map(i=>i+1));

      const dayLogs = logs.filter(l=>l.date === sel);

      // Monthly summary
      const monthStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
      const monthLogs = logs.filter(l => l.date.startsWith(monthStr) && (l.status === 'completed' || !l.status));
      const monthCount = monthLogs.length;
      const monthHours = (monthLogs.reduce((a,b)=>a+(b.durationMinutes||0),0)/60).toFixed(1);

      // Heatmap: compute total minutes per day for the month
      const dayMinutes = {};
      monthLogs.forEach(l => {
        dayMinutes[l.date] = (dayMinutes[l.date] || 0) + (l.durationMinutes || 0);
      });
      const getHeatColor = (ds) => {
        const m = dayMinutes[ds] || 0;
        if (m === 0) return '';
        if (m <= 30) return 'bg-blue-100';
        if (m <= 60) return 'bg-blue-200';
        if (m <= 90) return 'bg-blue-300';
        return 'bg-blue-400';
      };

      return (
        <div className="p-6 animate-slide-up pb-24">
           <div className="flex justify-between items-center mb-3">
             <h2 className="text-xl font-black text-slate-800">{date.toLocaleString('zh-HK',{month:'long',year:'numeric'})}</h2>
             <div className="flex gap-2">
               <button onClick={()=>setDate(new Date(date.getFullYear(),date.getMonth()-1,1))} className="p-2 border rounded-lg text-slate-500 hover:bg-slate-50">←</button>
               <button onClick={()=>setDate(new Date(date.getFullYear(),date.getMonth()+1,1))} className="p-2 border rounded-lg text-slate-500 hover:bg-slate-50">→</button>
             </div>
           </div>
           <div className="flex gap-4 mb-4 text-xs font-bold text-slate-500">
             <span>✅ {monthCount} 次</span>
             <span>⏱️ {monthHours} hr</span>
           </div>

           <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-7 gap-1">
             {['日','一','二','三','四','五','六'].map(d=><div key={d} className="text-center text-[10px] font-black text-slate-400 py-1">{d}</div>)}
             {days.map((d,i) => {
               if(!d) return <div key={i}></div>;
               const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
               
               const logsForDay = logs.filter(l=>l.date === ds);
               
               let dayIcon = null;
               let isPlanned = false;
               
               if (logsForDay.length > 0) {
                 // 1. Prioritize Completed over Planned
                 const completedLogs = logsForDay.filter(l => l.status === 'completed' || !l.status);
                 
                 let targetLog;
                 if (completedLogs.length > 0) {
                   // If multiple completed, pick the one with longest duration
                   targetLog = completedLogs.sort((a,b) => (b.durationMinutes||0) - (a.durationMinutes||0))[0];
                   isPlanned = false;
                 } else {
                   // If only planned exists
                   targetLog = logsForDay[0];
                   isPlanned = true;
                 }
                 
                 if (targetLog) {
                   const cat = CATEGORIES.find(c => c.value === targetLog.category);
                   if (cat) dayIcon = cat.icon;
                 }
               }

               return (
                 <button key={i} onClick={()=>setSel(ds)} className={`aspect-square rounded-xl flex flex-col items-center justify-start pt-1.5 relative transition-all ${sel===ds ? 'bg-slate-800 text-white shadow-lg scale-105 z-10' : `${getHeatColor(ds)} hover:opacity-80 text-slate-700`}`}>
                   <span className={`text-xs font-bold leading-none ${sel!==ds && isFutureDate(ds) ? 'text-slate-300' : ''}`}>{d}</span>
                   
                   <div className="flex-1 flex items-center justify-center -mt-1">
                      {dayIcon ? (
                        <span className={`text-base ${isPlanned ? 'opacity-40 grayscale' : ''} filter drop-shadow-sm`}>
                          {dayIcon}
                        </span>
                      ) : (
                        null
                      )}
                   </div>
                 </button>
               )
             })}
           </div>

           <div className="mt-6 space-y-3">
             <div className="flex justify-between items-center px-1">
                <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest">{sel}</h3>
                <span className="text-[10px] font-bold text-slate-400">{dayLogs.length} 筆行程</span>
             </div>
             {dayLogs.map(l => (
               <div key={l.id} onClick={()=>onEdit(l)} className={`p-4 rounded-3xl border flex items-center gap-4 cursor-pointer transition-colors ${l.status==='planned' ? 'bg-slate-50 border-dashed border-slate-300 hover:border-blue-300' : 'bg-white border-slate-100 hover:border-slate-300'}`}>
                 <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg ${l.status==='planned'?'bg-slate-200 text-slate-500':`${CATEGORIES.find(c=>c.value===l.category)?.color} text-white`}`}>
                    {CATEGORIES.find(c=>c.value===l.category)?.icon}
                 </div>
                 <div className="flex-1">
                    <div className="flex justify-between">
                        <div className="font-bold text-slate-800 text-sm">{l.subcategory}</div>
                        {l.status === 'planned' && <span className="text-[9px] bg-slate-200 px-2 rounded-full flex items-center text-slate-500 font-bold">計劃中</span>}
                    </div>
                    <div className="text-[10px] text-slate-400 mt-1">
                        {l.startTime ? `${l.startTime} - ${l.endTime}` : `${l.durationMinutes} min`}
                        {(l.status === 'completed' || !l.status) && (
                            <span className="flex items-center gap-1">
                                {l.effort && <span>• 強度 {l.effort}</span>}
                                {l.performance && <span>• 表現 {l.performance}</span>}
                            </span>
                        )}
                    </div>
                 </div>
               </div>
             ))}
             {dayLogs.length === 0 && <div className="text-center py-8 text-slate-400 text-xs">本日無行程</div>}
           </div>
        </div>
      )
    }

    const toLocalDs = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

    const MultiDatePicker = ({ selected, onChange, excludeDate }) => {
      const [calMonth, setCalMonth] = React.useState(() => {
        // Start on current month
        const t = new Date(); return new Date(t.getFullYear(), t.getMonth(), 1);
      });
      const todayStr = getLocalTodayString();
      const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0).getDate();
      const firstDay = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1).getDay();
      const days = Array(firstDay).fill(null).concat([...Array(daysInMonth).keys()].map(i=>i+1));
      const toggle = (ds) => onChange(selected.includes(ds) ? selected.filter(x=>x!==ds) : [...selected, ds]);
      return (
        <div>
          <div className="flex items-center justify-between mb-3">
            <button type="button" onClick={()=>setCalMonth(new Date(calMonth.getFullYear(), calMonth.getMonth()-1, 1))} className="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 text-slate-600 font-bold text-lg">←</button>
            <span className="font-black text-sm text-slate-700">{calMonth.toLocaleString('zh-HK',{month:'long',year:'numeric'})}</span>
            <button type="button" onClick={()=>setCalMonth(new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 1))} className="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 text-slate-600 font-bold text-lg">→</button>
          </div>
          <div className="grid grid-cols-7 gap-1">
            {['日','一','二','三','四','五','六'].map(d=><div key={d} className="text-center text-[10px] font-black text-slate-400 py-1">{d}</div>)}
            {days.map((d,i) => {
              if (!d) return <div key={`e${i}`}></div>;
              const date = new Date(calMonth.getFullYear(), calMonth.getMonth(), d);
              const ds = toLocalDs(date);
              const isSelected = selected.includes(ds);
              const isToday = ds === todayStr;
              const isExcluded = ds === excludeDate;
              const isWeekend = date.getDay() === 0 || date.getDay() === 6;
              return (
                <button key={ds} type="button" disabled={isExcluded}
                  onClick={()=>toggle(ds)}
                  className={`aspect-square rounded-xl flex items-center justify-center text-xs font-bold transition-all
                    ${isExcluded ? 'opacity-20 cursor-not-allowed' : 'active:scale-95'}
                    ${isSelected ? 'bg-blue-600 text-white shadow-md' : isToday ? 'bg-slate-800 text-white' : isWeekend ? 'bg-blue-50 text-blue-600' : 'bg-slate-50 text-slate-600'}
                  `}>
                  {d}
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    const Form = ({ onSave, onCancel, onDelete, onCopy, initData, logs }) => {
      const [data, setData] = useState(() => {
        const defaults = { 
            category: 'Gym', 
            subcategory: '重量訓練', 
            date: getLocalTodayString(),
            startTime: '18:00',
            endTime: '19:00',
            durationMinutes: 60,
            status: 'completed', // 'planned' or 'completed'
            effort: 5, 
            performance: 7, 
            mood: '😊', 
            friends: [],
            notes: '',
            improvement: ''
        };
        
        if (!initData) return defaults;
        // Check for old data missing status
        return { 
            ...defaults, 
            ...initData,
            status: initData.status || 'completed' // Default old data to completed
        };
      });

      const [friendInput, setFriendInput] = useState('');
      const [showFriendDropdown, setShowFriendDropdown] = useState(false);
      const [quickDuration, setQuickDuration] = useState(() => {
        if (initData?.durationMinutes) {
          return [30,45,60,90,120].includes(initData.durationMinutes) ? initData.durationMinutes : 'custom';
        }
        return 60;
      });
      const [showCopyModal, setShowCopyModal] = useState(false);
      const [copyDates, setCopyDates] = useState([]);

      const allFriends = React.useMemo(() => {
        if(!logs) return [];
        const friendSet = new Set();
        logs.forEach(l => {
           if(l.friends) l.friends.forEach(f => friendSet.add(f));
        });
        return Array.from(friendSet).sort();
      }, [logs]);

      // Derived Frequent Friends
      const recentFriends = React.useMemo(() => {
        if(!logs) return [];
        const friendCounts = {};
        logs.forEach(l => {
           if(l.friends) {
               l.friends.forEach(f => {
                   friendCounts[f] = (friendCounts[f] || 0) + 1;
               });
           }
        });
        return Object.entries(friendCounts)
                     .sort((a,b) => b[1] - a[1]) // Sort by frequency
                     .map(([name]) => name)
                     .slice(0, 8); // Top 8
      }, [logs]);

      useEffect(() => {
        if (!initData) { 
            if (isFutureDate(data.date)) {
                setData(prev => ({ ...prev, status: 'planned' }));
            } else {
                setData(prev => ({ ...prev, status: 'completed' }));
            }
        }
      }, [data.date]);

      useEffect(() => {
        if (quickDuration === 'custom') {
          const mins = calculateDuration(data.startTime, data.endTime);
          setData(prev => ({ ...prev, durationMinutes: mins }));
        }
      }, [data.startTime, data.endTime, quickDuration]);

      useEffect(() => {
        if (quickDuration !== 'custom' && data.startTime) {
          const [h, m] = data.startTime.split(':').map(Number);
          const totalMins = h * 60 + m + quickDuration;
          const newH = Math.floor(totalMins / 60) % 24;
          const newM = totalMins % 60;
          const newEndTime = `${String(newH).padStart(2,'0')}:${String(newM).padStart(2,'0')}`;
          setData(prev => ({ ...prev, endTime: newEndTime, durationMinutes: quickDuration }));
        }
      }, [quickDuration, data.startTime]);

      const isPlanned = data.status === 'planned';

      const addFriend = (name) => {
          const v = name.trim();
          if(v && !data.friends.includes(v)) {
              setData({...data, friends:[...data.friends,v]});
          }
          setFriendInput('');
      };

      return (
        <div className="p-6 animate-slide-up pb-24 space-y-6">
          <div className="flex justify-between items-center">
             <h2 className="text-2xl font-black">{initData ? (isPlanned ? '編輯計劃' : '編輯紀錄') : (isPlanned ? '新增計劃' : '新增紀錄')}</h2>
             <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center bg-white rounded-full border">✕</button>
          </div>

          <div className="bg-white p-5 rounded-3xl space-y-4 border border-slate-100 shadow-sm">
             <div className="grid grid-cols-2 gap-4">
               <div>
                   <label className="text-[10px] font-black text-slate-400 uppercase">日期</label>
                   <input type="date" value={data.date} onChange={e=>setData({...data, date:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900" />
               </div>
               <div>
                   <label className="text-[10px] font-black text-slate-400 uppercase">狀態</label>
                   <select value={data.status} onChange={e=>setData({...data, status:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900">
                       <option value="completed">✅ 已完成</option>
                       <option value="planned">📅 計劃中</option>
                   </select>
               </div>
             </div>

             <div>
               <label className="text-[10px] font-black text-slate-400 uppercase">開始時間</label>
               <input type="time" value={data.startTime} onChange={e=>setData({...data, startTime:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900" />
             </div>

             <div>
               <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">時長</label>
               <div className="flex flex-wrap gap-2">
                 {[30,45,60,90,120].map(mins => (
                   <button key={mins} type="button" onClick={()=>setQuickDuration(mins)}
                     className={`px-3 py-2 rounded-xl text-sm font-bold transition-all ${quickDuration===mins ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'}`}>
                     {mins >= 60 ? `${Math.floor(mins/60)}${mins%60 ? `h${mins%60}m` : 'h'}` : `${mins}m`}
                   </button>
                 ))}
                 <button type="button" onClick={()=>setQuickDuration('custom')}
                   className={`px-3 py-2 rounded-xl text-sm font-bold transition-all ${quickDuration==='custom' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'}`}>
                   自訂
                 </button>
               </div>
             </div>

             {quickDuration === 'custom' && (
               <div>
                 <label className="text-[10px] font-black text-slate-400 uppercase">結束時間</label>
                 <input type="time" value={data.endTime} onChange={e=>setData({...data, endTime:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900" />
               </div>
             )}

             <div className="flex items-center justify-center gap-2 text-xs text-slate-400 font-bold bg-slate-50 py-2 rounded-lg">
                 <span>⏱️ {Math.floor(data.durationMinutes/60)} 小時 {data.durationMinutes%60} 分鐘</span>
             </div>
          </div>

          <div className="grid grid-cols-3 gap-2">
            {CATEGORIES.map(c => (
              <button key={c.value} onClick={()=>setData({...data, category:c.value, subcategory:c.subcategories[0]})} className={`p-2 rounded-2xl border-2 transition-all ${data.category===c.value ? `border-slate-800 bg-white` : 'border-transparent bg-white opacity-40'}`}>
                <div className="text-2xl">{c.icon}</div>
                <div className="text-[9px] font-bold text-slate-500 mt-1">{c.value}</div>
              </button>
            ))}
          </div>

          <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
             <label className="text-[10px] font-black text-slate-400 uppercase">項目細節</label>
             <select value={data.subcategory} onChange={e=>setData({...data, subcategory:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900">
                {CATEGORIES.find(c=>c.value===data.category).subcategories.map(s=><option key={s} value={s}>{s}</option>)}
             </select>
          </div>

          {isPlanned ? (
             <div className="bg-blue-50 p-4 rounded-3xl border border-blue-100 text-center">
                 <p className="text-blue-600 font-bold text-sm">💡 這是未來計劃</p>
                 <p className="text-[10px] text-blue-400 mt-1">強度、心情與夥伴功能將在您將狀態改為「已完成」後顯示。</p>
             </div>
          ) : (
             <div className="space-y-6 animate-fade-in">
                <div className="bg-white p-5 rounded-3xl space-y-4 border border-slate-100 shadow-sm">
                    <div>
                        <div className="flex justify-between mb-1">
                            <label className="text-[10px] font-black text-slate-400 uppercase">自覺強度 (RPE)</label>
                            <span className="text-xs font-bold text-slate-600">{data.effort} / 10</span>
                        </div>
                        <input type="range" min="1" max="10" value={data.effort} onChange={e=>setData({...data, effort:Number(e.target.value)})} className="w-full h-8 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                        <div className="flex justify-between text-[8px] text-slate-400 font-bold px-1">
                            <span>輕鬆</span>
                            <span>極限</span>
                        </div>
                    </div>
                    
                    <div className="h-px bg-slate-100"></div>

                    <div>
                        <div className="flex justify-between mb-1">
                            <label className="text-[10px] font-black text-slate-400 uppercase">運動表現</label>
                            <span className="text-xs font-bold text-slate-600">{data.performance || 5} / 10</span>
                        </div>
                        <input type="range" min="1" max="10" value={data.performance || 5} onChange={e=>setData({...data, performance:Number(e.target.value)})} className="w-full h-8 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-green-500" />
                        <div className="flex justify-between text-[8px] text-slate-400 font-bold px-1">
                            <span>未如理想</span>
                            <span>超水準</span>
                        </div>
                    </div>
                </div>

                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                    <label className="text-[10px] font-black text-slate-400 uppercase">訓練心情</label>
                    <div className="flex justify-between mt-2">
                    {['🤩','😊','😐','😫','😡'].map(m => (
                        <button key={m} onClick={()=>setData({...data, mood:m})} className={`text-2xl p-2 rounded-xl transition-all ${data.mood===m ? 'bg-slate-100 scale-125 shadow-sm ring-1 ring-slate-200' : 'opacity-40 grayscale'}`}>{m}</button>
                    ))}
                    </div>
                </div>

                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                    <label className="text-[10px] font-black text-slate-400 uppercase">同行夥伴</label>
                    
                    {/* Frequent Friends Suggestions */}
                    {recentFriends.length > 0 && (
                        <div className="mb-3">
                            <p className="text-[9px] text-slate-400 font-bold mb-2">常用好友</p>
                            <div className="flex flex-wrap gap-2">
                                {recentFriends.map(f => {
                                    const isAdded = data.friends.includes(f);
                                    if(isAdded) return null; // Don't show if already added
                                    return (
                                        <button 
                                            key={f}
                                            onClick={() => addFriend(f)}
                                            className="px-3 py-1.5 rounded-xl bg-slate-50 hover:bg-slate-100 text-xs font-bold text-slate-600 border border-slate-100 active:scale-95 transition-all"
                                        >
                                            + {f}
                                        </button>
                                    )
                                })}
                            </div>
                        </div>
                    )}

                    <div className="relative mt-2">
                        <div className="flex gap-2">
                            <input 
                                type="text" 
                                value={friendInput} 
                                onChange={e=>setFriendInput(e.target.value)} 
                                onFocus={() => setShowFriendDropdown(true)}
                                onBlur={() => setTimeout(() => setShowFriendDropdown(false), 200)}
                                placeholder="搜尋或輸入新名字..." 
                                className="flex-1 p-3 bg-slate-50 rounded-xl text-sm text-slate-900 font-bold focus:ring-2 focus:ring-blue-500 outline-none" 
                            />
                            <button onClick={() => addFriend(friendInput)} className="bg-slate-900 text-white px-4 rounded-xl font-bold shadow-lg">+</button>
                        </div>
                        
                        {showFriendDropdown && (
                            <div className="absolute z-10 w-full mt-1 bg-white border border-slate-100 rounded-xl shadow-xl max-h-48 overflow-y-auto custom-scrollbar">
                                {allFriends
                                    .filter(f => f.toLowerCase().includes(friendInput.toLowerCase()) && !data.friends.includes(f))
                                    .map(f => (
                                    <div 
                                        key={f} 
                                        onClick={() => addFriend(f)}
                                        className="p-3 hover:bg-slate-50 cursor-pointer text-sm font-bold text-slate-700 border-b border-slate-50 last:border-0"
                                    >
                                        {f}
                                    </div>
                                ))}
                                {friendInput && !allFriends.some(f => f.toLowerCase() === friendInput.toLowerCase()) && (
                                    <div 
                                        onClick={() => addFriend(friendInput)}
                                        className="p-3 hover:bg-slate-50 cursor-pointer text-sm font-bold text-blue-600 flex items-center gap-2"
                                    >
                                        <span>+ 新增 "{friendInput}"</span>
                                    </div>
                                )}
                                {!friendInput && allFriends.filter(f => !data.friends.includes(f)).length === 0 && (
                                    <div className="p-3 text-sm text-slate-400 text-center">無其他好友</div>
                                )}
                            </div>
                        )}
                    </div>
                    <div className="flex flex-wrap gap-2 mt-3">{data.friends.map(f=><span key={f} onClick={()=>setData({...data, friends:data.friends.filter(x=>x!==f)})} className="bg-blue-600 text-white px-2 py-1 rounded-lg text-xs font-bold cursor-pointer shadow-md shadow-blue-200">{f} ✕</span>)}</div>
                </div>

                {/* New: Notes and Improvements */}
                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                    <div>
                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">重點備忘 (Notes)</label>
                        <textarea 
                            value={data.notes} 
                            onChange={e=>setData({...data, notes:e.target.value})} 
                            placeholder="e.g. 試了新球拍，感覺手感不錯..." 
                            className="w-full p-3 bg-slate-50 rounded-xl text-sm text-slate-900 font-medium resize-none h-20 placeholder-slate-300"
                        />
                    </div>
                    <div>
                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">技術筆記 / 待改善 (Tech Notes)</label>
                        <textarea 
                            value={data.improvement} 
                            onChange={e=>setData({...data, improvement:e.target.value})} 
                            placeholder="e.g. 殺球落點太淺，深蹲膝蓋內扣..." 
                            className="w-full p-3 bg-red-50 rounded-xl text-sm text-slate-900 font-medium resize-none h-20 placeholder-red-200 border border-red-100"
                        />
                    </div>
                </div>
             </div>
          )}

          <button onClick={()=>onSave({...data, id:initData?.id||Date.now().toString()})} className={`w-full py-4 text-white rounded-2xl font-black shadow-xl transform active:scale-95 transition-all ${isPlanned ? 'bg-slate-500 shadow-slate-200' : 'bg-slate-900 shadow-slate-300'}`}>
              {isPlanned ? '📅 儲存計劃' : '✅ 完成打卡'}
          </button>
          
          {initData && (
            <div className="flex gap-3">
              <button onClick={()=>setShowCopyModal(true)} className="flex-1 text-blue-500 font-bold text-sm py-2 bg-blue-50 rounded-2xl">📋 複製到其他日期</button>
              <button onClick={()=>onDelete(initData.id)} className="flex-1 text-red-400 font-bold text-sm py-2 bg-red-50 rounded-2xl">刪除此項目</button>
            </div>
          )}

          {showCopyModal && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-end" onClick={()=>setShowCopyModal(false)}>
              <div className="bg-white w-full rounded-t-3xl p-6 pb-10 max-h-[70vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-black">複製到其他日期</h3>

    const App = () => {
      const [view, setView] = useState('dashboard');
      const [friendsKey, setFriendsKey] = useState(0);
      const [logs, setLogs] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
