<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FitTrack 運動日常</title>
  <meta name="description" content="一個全功能的運動追蹤應用程式">
  
  <!-- PWA & Mobile Settings -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      overscroll-behavior-x: none;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-slow { animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    /* iPhone Safe Area Fix */
    .safe-area-pt { padding-top: max(1.5rem, env(safe-area-inset-top)); }
    .safe-area-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  
  <!-- Import Map -->
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "@google/genai": "https://esm.run/@google/genai",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import ReactDOM from 'react-dom/client';
    import { initializeApp, getApps, getApp } from 'firebase/app';
    import { getFirestore, doc, setDoc, onSnapshot, getDoc } from 'firebase/firestore';
    import { getAuth, onAuthStateChanged, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, GoogleAuthProvider } from 'firebase/auth';
    import { GoogleGenAI } from "@google/genai";

    const GEMINI_API_KEY = "AIzaSyAGe1-HT-X-SkbAkcFIvGr3cFr9EEYcxcQ";

    const CATEGORIES = [
      { value: 'Gym', subcategories: ['功能性訓練', '重量訓練', '帶氧運動', 'HIIT', '伸展'], color: 'bg-blue-500', text: 'text-blue-500', icon: '💪' },
      { value: '羽毛球', subcategories: ['街場/Drop-in/Friendly', '技術練習', '正式比賽'], color: 'bg-green-500', text: 'text-green-500', icon: '🏸' },
      { value: '排球', subcategories: ['打比賽', '隊訓', '街場/Drop-in/Friendly', '技術訓練'], color: 'bg-orange-500', text: 'text-orange-500', icon: '🏐' },
      { value: '跑步', subcategories: ['慢跑', '長跑', '衝刺練習', '馬拉松訓練'], color: 'bg-red-500', text: 'text-red-500', icon: '🏃' },
      { value: '拉筋', subcategories: ['晨間伸展', '睡前放鬆', '運動後拉筋', '滾筒放鬆', '動態伸展'], color: 'bg-indigo-500', text: 'text-indigo-500', icon: '🤸' },
      { value: '其他', subcategories: ['自定義項目'], color: 'bg-slate-500', text: 'text-slate-500', icon: '✨' },
    ];

    const firebaseConfig = {
      apiKey: "AIzaSyCxrAn6x69Ki4c-MTrpBhyGnX2XFKW2f4k",
      authDomain: "fittracker-chunlam252.firebaseapp.com",
      projectId: "fittracker-chunlam252",
      storageBucket: "fittracker-chunlam252.firebasestorage.app",
      messagingSenderId: "629880531604",
      appId: "1:629880531604:web:76fd44292a79fbdad86281"
    };

    const STORAGE_KEY = 'fittrack_logs_v2'; 
    const AI_CACHE_KEY = 'fittrack_ai_advice_cache';
    
    // --- HELPER ---
    const getLocalTodayString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    const isFutureDate = (dateStr) => {
      const today = new Date();
      today.setHours(0,0,0,0);
      const target = new Date(dateStr);
      return target > today; 
    };

    const calculateDuration = (start, end) => {
      if (!start || !end) return 0;
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      let diff = (eh * 60 + em) - (sh * 60 + sm);
      if (diff < 0) diff += 24 * 60; // Handle overnight
      return diff;
    };

    const initFirebase = () => {
      try {
        const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
        return { auth: getAuth(app), db: getFirestore(app) };
      } catch (e) { console.error("Firebase init error:", e); return null; }
    };

    // --- AI COMPONENT (Collapsible & Alien Icon) ---
    const SmartCoach = ({ advice, loading, onRefresh }) => {
      const [expanded, setExpanded] = useState(false);

      // 嚴格分割邏輯
      let part1 = advice || '';
      let part2 = null;

      if (advice && !loading) {
         // 嘗試尋找 "Part 2" 或 "Part 2:" 或 "第二部分"
         const separatorRegex = /(Part 2|第二部分)/i;
         const match = advice.match(separatorRegex);
         
         if (match && match.index > 10) {
             // 找到分割點
             part1 = advice.substring(0, match.index).trim();
             // 清理 Part 1 尾部可能多餘的分隔線
             part1 = part1.replace(/[-_=]{3,}$/gm, '').trim();
             
             part2 = advice.substring(match.index).trim();
         } else if (advice.length > 200) {
             // 沒找到關鍵字，但太長了，強制折疊
             const cutIndex = advice.indexOf('\n', 150); // 在 150 字後找換行
             if (cutIndex !== -1) {
                 part1 = advice.substring(0, cutIndex).trim() + "...";
                 part2 = advice.substring(cutIndex).trim();
             }
         }
      }

      return (
        <div className="bg-gradient-to-r from-violet-600 to-indigo-600 rounded-[2rem] p-5 text-white shadow-lg shadow-indigo-200 mb-6 relative overflow-hidden transition-all duration-300">
          <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
          
          <div className="relative z-10">
             {/* Header */}
             <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3">
                   <div className="w-10 h-10 rounded-2xl bg-white/20 flex items-center justify-center text-2xl backdrop-blur-sm border border-white/10">
                     👽
                   </div>
                   <div className="text-[10px] font-bold text-indigo-100 uppercase tracking-widest flex items-center gap-1">
                     AI 智能教練 <span className="bg-white/20 px-1.5 rounded text-[8px]">GEMINI</span>
                   </div>
                </div>
                <button onClick={onRefresh} disabled={loading} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                   <svg className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
             </div>

             {/* Content */}
             {loading ? (
                <div className="space-y-2 animate-pulse mt-2">
                  <div className="h-3 bg-white/20 rounded-full w-3/4"></div>
                  <div className="h-3 bg-white/20 rounded-full w-1/2"></div>
                </div>
             ) : (
                <div>
                    <div className="text-sm font-medium leading-relaxed tracking-wide whitespace-pre-wrap">
                        {part1}
                    </div>
                    
                    {part2 && (
                        <>
                            {expanded && (
                                <div className="mt-4 pt-4 border-t border-white/20 animate-slide-up whitespace-pre-wrap text-sm font-medium leading-relaxed tracking-wide">
                                    {part2}
                                </div>
                            )}
                            <button 
                                onClick={() => setExpanded(!expanded)}
                                className="w-full mt-3 py-2 text-[10px] font-bold uppercase tracking-widest bg-white/10 hover:bg-white/20 rounded-xl transition-colors flex items-center justify-center gap-2 group"
                            >
                                {expanded ? (
                                    <span className="flex items-center gap-2">⬆️ 收起每週分析</span>
                                ) : (
                                    <span className="flex items-center gap-2 group-hover:scale-105 transition-transform">⬇️ 查看每週分析與建議</span>
                                )}
                            </button>
                        </>
                    )}
                </div>
             )}
          </div>
        </div>
      );
    };

    // --- MAIN APP COMPONENTS ---

    const Layout = ({ children, activeView, setView, user, status, onAuth }) => (
      <div className="flex flex-col h-[100dvh] max-w-md mx-auto bg-white shadow-2xl relative overflow-hidden border-x border-slate-100">
        <header className="px-6 pb-4 bg-white/90 backdrop-blur border-b border-slate-100 z-30 flex justify-between items-center shrink-0 safe-area-pt">
          <div>
            <h1 className="text-xl font-black text-slate-800 tracking-tight flex items-center gap-2">
              FitTrack
            </h1>
            <div className="flex items-center gap-1.5 mt-1">
              <div className={`w-1.5 h-1.5 rounded-full ${status.includes('連線') || status.includes('同步') ? 'bg-green-500' : (status.includes('錯') ? 'bg-red-500' : 'bg-slate-300')}`}></div>
              <p className="text-[9px] font-bold text-slate-400">{status}</p>
            </div>
          </div>
          <button onClick={() => setView('settings')} className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-slate-100 transition-colors">
            {user?.photoURL ? 
              <img src={user.photoURL} className="w-full h-full rounded-full object-cover border border-slate-200" alt="user" /> : 
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            }
          </button>
        </header>
        <main className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50 relative">{children}</main>
        <nav className="shrink-0 bg-white border-t border-slate-100 grid grid-cols-5 items-end pb-6 pt-2 px-2 z-30 safe-area-pb shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)]">
          <NavBtn active={activeView === 'dashboard'} onClick={() => setView('dashboard')} icon="home" label="主頁" />
          <NavBtn active={activeView === 'trends'} onClick={() => setView('trends')} icon="chart" label="統計" />
          <div className="flex justify-center -mt-12 relative z-10 pointer-events-none">
            <button onClick={() => setView('add')} className="pointer-events-auto flex flex-col items-center group active:scale-95 transition-transform">
              <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-blue-200 border-[6px] border-white ring-1 ring-slate-100">
                <span className="text-2xl">+</span>
              </div>
              <span className="text-[10px] font-bold text-blue-600 mt-1">紀錄</span>
            </button>
          </div>
          <NavBtn active={activeView === 'calendar'} onClick={() => setView('calendar')} icon="calendar" label="日曆" />
          <NavBtn active={activeView === 'friends'} onClick={() => setView('friends')} icon="users" label="好友" />
        </nav>
      </div>
    );

    const NavBtn = ({ active, onClick, icon, label }) => {
      const icons = {
        home: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
        chart: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
        calendar: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
        users: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
      };
      return (
        <button onClick={onClick} className={`flex flex-col items-center gap-1 py-2 transition-all ${active ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
          <div className="h-6 flex items-center justify-center">{icons[icon]}</div>
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      );
    };

    const Dashboard = ({ logs, onEdit, setView, aiAdvice, aiLoading, onRefreshAi }) => {
      // 1. Stats: COMPLETED or OLD DATA (undefined status)
      const completedLogs = logs.filter(l => l.status === 'completed' || !l.status);
      
      const sorted = [...logs].sort((a,b) => {
        return new Date(b.date) - new Date(a.date);
      });

      const now = new Date();
      const thisWeekCount = completedLogs.filter(l => {
        const d = new Date(l.date.replace(/-/g, '/'));
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - now.getDay());
        startOfWeek.setHours(0,0,0,0);
        return d >= startOfWeek;
      }).length;
      
      const last5 = completedLogs.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
      const moodMap = { '🤩': 5, '😊': 4, '😐': 3, '😫': 2, '😡': 1 };
      let moodText = '暫無';
      if(last5.length > 0) {
        const total = last5.reduce((acc, l) => acc + (moodMap[l.mood] || 3), 0);
        const avg = total / last5.length;
        if (avg >= 4.5) moodText = '🤩 絕佳';
        else if (avg >= 3.5) moodText = '😊 不錯';
        else if (avg >= 2.5) moodText = '😐 普通';
        else if (avg >= 1.5) moodText = '😫 疲累';
        else moodText = '😡 糟糕';
      }

      return (
        <div className="p-6 space-y-6 animate-slide-up pb-24">
          <SmartCoach advice={aiAdvice} loading={aiLoading} onRefresh={onRefreshAi} />

          <div className="grid grid-cols-2 gap-4">
             <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between h-28">
               <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">本週完成</div>
               <div className="text-3xl font-black text-slate-800">{thisWeekCount}<span className="text-sm font-bold text-slate-400 ml-1">次</span></div>
             </div>
             <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between h-28">
               <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">近期心情</div>
               <div className="text-lg font-black text-slate-800">{moodText}</div>
             </div>
          </div>

          <div>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">最近行程</h3>
              <button onClick={()=>setView('calendar')} className="text-xs font-bold text-blue-600">查看日曆</button>
            </div>
            <div className="space-y-3">
              {sorted.slice(0, 10).map(l => {
                const c = CATEGORIES.find(x=>x.value===l.category) || CATEGORIES[5];
                const isPlanned = l.status === 'planned';
                
                return (
                  <div 
                    key={l.id} 
                    onClick={()=>onEdit(l)} 
                    className={`
                      relative p-4 rounded-3xl border flex items-center gap-4 active:scale-[0.98] transition-all cursor-pointer group
                      ${isPlanned 
                        ? 'bg-transparent border-dashed border-slate-300 opacity-75 hover:opacity-100' 
                        : 'bg-white shadow-sm border-slate-100'
                      }
                    `}
                  >
                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner transition-colors ${isPlanned ? 'bg-slate-100 text-slate-400' : `${c.color} text-white`}`}>
                      {c.icon}
                    </div>
                    <div className="flex-1">
                      <div className="flex justify-between items-start">
                         <h4 className={`font-bold text-sm ${isPlanned ? 'text-slate-500' : 'text-slate-800'}`}>{l.subcategory}</h4>
                         {isPlanned && <span className="text-[9px] font-bold bg-slate-200 text-slate-500 px-2 py-0.5 rounded-full">計劃</span>}
                      </div>
                      
                      <div className="text-[10px] font-bold text-slate-400 uppercase mt-1 flex flex-wrap gap-2 items-center">
                        <span className={isPlanned ? "text-slate-500" : ""}>{l.date.replace(/-/g, '/')}</span>
                        {l.startTime && <span>• {l.startTime} - {l.endTime}</span>}
                        {l.durationMinutes && !l.startTime && <span>• {l.durationMinutes} min</span>}
                        {!isPlanned && <span>• {l.mood || 'N/A'}</span>}
                        {!isPlanned && (l.effort || l.performance) && (
                            <span className="flex items-center gap-1">
                                {l.effort && <span>• 強度 {l.effort}</span>}
                                {l.performance && <span>• 表現 {l.performance}</span>}
                            </span>
                        )}
                      </div>
                    </div>
                    {isPlanned && (
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center text-slate-300 group-hover:bg-green-500 group-hover:text-white group-hover:border-transparent transition-all">
                            ✓
                        </div>
                    )}
                  </div>
                )
              })}
              {logs.length===0 && <div className="text-center py-10 text-slate-400 text-sm">暫無紀錄，按 + 開始</div>}
            </div>
          </div>
        </div>
      )
    };

    const Trends = ({ logs }) => {
      // Logic: ONLY COMPLETED logs
      const completed = logs.filter(l => l.status === 'completed' || !l.status);
      const [filter, setFilter] = useState('month'); // 'all', 'month', 'year'

      // Filter Logic for Breakdown and Totals
      const now = new Date();
      const filteredLogs = completed.filter(l => {
         const d = new Date(l.date.replace(/-/g, '/'));
         if (filter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
         if (filter === 'year') return d.getFullYear() === now.getFullYear();
         return true;
      });

      // Recalculate Totals based on Filter
      const totalMins = filteredLogs.reduce((a,b) => a + (b.durationMinutes||0), 0);
      const totalCount = filteredLogs.length;

      // Last 7 days (Keep as is, showing recent activity regardless of filter)
      const last7 = Array.from({length:7}).map((_,i) => {
        const d = new Date(); 
        d.setDate(d.getDate() - (6-i));
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        // Note: We use 'completed' here (all time) for the trend chart, or should it respect filter?
        // UX: Typically "Recent Trend" is "Recent", so it shouldn't be affected by "Month/Year" filter which applies to aggregates.
        const mins = completed.filter(l=>l.date === dateStr).reduce((a,b)=>a+(b.durationMinutes||0),0);
        return { day: d.getDate(), mins, isToday: i===6 };
      });
      const maxWeekly = Math.max(...last7.map(d=>d.mins), 60);

      // Breakdown based on Filtered Logs
      const breakdown = CATEGORIES.map(cat => {
        const catLogs = filteredLogs.filter(l => l.category === cat.value);
        const totalMinutes = catLogs.reduce((a,b)=>a+(b.durationMinutes||0), 0);
        return { ...cat, totalMinutes, count: catLogs.length, hours: (totalMinutes/60).toFixed(1) };
      }).filter(c => c.totalMinutes > 0).sort((a,b) => b.totalMinutes - a.totalMinutes);

      // 找出最大值，用於計算進度條的「相對比例」 (最大值為 100% 寬度)
      const maxCatMinutes = breakdown.length > 0 ? breakdown[0].totalMinutes : 0;

      const FilterBtn = ({ val, label }) => (
          <button 
            onClick={() => setFilter(val)}

    const Calendar = ({ logs, onEdit }) => {

      const firstDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
      const days = Array(firstDay).fill(null).concat([...Array(daysInMonth).keys()].map(i=>i+1));

               <button onClick={()=>setDate(new Date(date.getFullYear(),date.getMonth()-1,1))} className="p-2 border rounded-lg text-slate-500 hover:bg-slate-50">←</button>

             {days.map((d,i) => {
               if(!d) return <div key={i}></div>;
               const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
               
               const logsForDay = logs.filter(l=>l.date === ds);
               
               let dayIcon = null;
               let isPlanned = false;
               
               if (logsForDay.length > 0) {
                 // 1. Prioritize Completed over Planned
                 const completedLogs = logsForDay.filter(l => l.status === 'completed' || !l.status);
                 
                 let targetLog;
                 if (completedLogs.length > 0) {
                   // If multiple completed, pick the one with longest duration
                   targetLog = completedLogs.sort((a,b) => (b.durationMinutes||0) - (a.durationMinutes||0))[0];
                   isPlanned = false;
                 } else {
                   // If only planned exists
                   targetLog = logsForDay[0];
                   isPlanned = true;

                   if (cat) dayIcon = cat.icon;

                 <button key={i} onClick={()=>setSel(ds)} className={`aspect-square rounded-xl flex flex-col items-center justify-start pt-1.5 relative transition-all ${sel===ds ? 'bg-slate-800 text-white shadow-lg scale-105 z-10' : 'hover:bg-slate-50 text-slate-700'}`}>

    const FriendsView = ({ logs }) => {
      const [selectedFriend, setSelectedFriend] = useState(null);

      // 1. Only count COMPLETED sessions (backward compat)
      const completed = logs.filter(l => l.status === 'completed' || !l.status);

      // If a friend is selected, show their specific logs and stats
      if (selectedFriend) {
        // Filter shared logs
        const sharedLogs = completed.filter(l => l.friends && l.friends.includes(selectedFriend));
        // Sort by date desc
        sharedLogs.sort((a,b) => new Date(b.date) - new Date(a.date));

        // Stats Logic
        const totalSharedCount = sharedLogs.length;
        const totalSharedHours = sharedLogs.reduce((acc, curr) => acc + (curr.durationMinutes || 0), 0) / 60;

        // Breakdown Logic
        const breakdown = CATEGORIES.map(cat => {
            const count = sharedLogs.filter(l => l.category === cat.value).length;
            const totalMins = sharedLogs.filter(l => l.category === cat.value).reduce((a,b) => a + (b.durationMinutes||0), 0);
            return { ...cat, count, totalMins };
        }).filter(x => x.count > 0).sort((a,b) => b.count - a.count);

        const maxCount = breakdown.length > 0 ? breakdown[0].count : 0;

        return (
            <div className="p-6 animate-slide-up pb-24">
                <div className="flex items-center gap-4 mb-6">
                    <button onClick={() => setSelectedFriend(null)} className="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-600 shadow-sm active:scale-95 transition-transform">
                        ←
                    </button>
                    <div>
                        <h2 className="text-xl font-black text-slate-800">{selectedFriend}</h2>
                        <p className="text-xs font-bold text-slate-400">好友詳情</p>
                    </div>
                </div>

                <div className="grid grid-cols-2 gap-3 mb-6">
                     <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                        <div className="text-[10px] font-black text-slate-400 uppercase">共同運動</div>
                        <div className="text-2xl font-black text-slate-800 mt-1">{totalSharedCount}<span className="text-xs text-slate-400 ml-1">次</span></div>
                     </div>
                     <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                        <div className="text-[10px] font-black text-slate-400 uppercase">累積時數</div>
                        <div className="text-2xl font-black text-slate-800 mt-1">{totalSharedHours.toFixed(1)}<span className="text-xs text-slate-400 ml-1">hr</span></div>
                     </div>
                </div>

                {breakdown.length > 0 && (
                    <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm mb-6">
                       <h3 className="text-xs font-black text-slate-400 uppercase mb-3">運動偏好</h3>
                       <div className="space-y-3">
                           {breakdown.map(item => {
                               const percentage = Math.round((item.count / totalSharedCount) * 100);
                               // Relative bar width based on max item
                               const barWidth = maxCount > 0 ? (item.count / maxCount) * 100 : 0;
                               
                               return (
                                   <div key={item.value}>
                                       <div className="flex justify-between text-xs font-bold mb-1">
                                           <div className="flex items-center gap-1">
                                                <span>{item.icon}</span>
                                                <span className="text-slate-700">{item.value}</span>
                                           </div>
                                           <div className="text-slate-400">{item.count}次 ({percentage}%)</div>
                                       </div>
                                       <div className="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                                           <div className={`h-full ${item.color}`} style={{width: `${barWidth}%`}}></div>
                                       </div>
                                   </div>
                               );
                           })}
                       </div>
                    </div>
                )}

                <h3 className="text-xs font-black text-slate-400 uppercase mb-3 px-1">最近紀錄</h3>
                <div className="space-y-3">
                    {sharedLogs.map(l => (
                        <div key={l.id} className="p-4 rounded-3xl bg-white border border-slate-100 flex items-center gap-4 shadow-sm">
                             <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg ${CATEGORIES.find(c=>c.value===l.category)?.color} text-white`}>
                                {CATEGORIES.find(c=>c.value===l.category)?.icon}
                             </div>
                             <div className="flex-1">
                                <div className="font-bold text-slate-800 text-sm">{l.subcategory}</div>
                                <div className="text-[10px] text-slate-400 mt-1">
                                    {l.date} • {l.durationMinutes} min
                                </div>
                             </div>
                             <div className="text-lg">{l.mood}</div>
                        </div>
                    ))}
                </div>
            </div>
        );
      }
      
      const friendStats = {};
      completed.forEach(l => {
        if(l.friends) l.friends.forEach(f => {
           if(!friendStats[f]) friendStats[f] = { count: 0, lastDate: l.date };
           friendStats[f].count++;
           if(new Date(l.date) > new Date(friendStats[f].lastDate)) friendStats[f].lastDate = l.date;
        });
      });
      const sorted = Object.entries(friendStats).sort((a,b) => b[1].count - a[1].count);

      return (
        <div className="p-6 animate-slide-up pb-24">
           <h2 className="text-2xl font-black text-slate-800 mb-6">好友榜單</h2>
           {sorted.length === 0 ? 
             <div className="text-center py-10 opacity-50">
                <div className="text-4xl mb-2">👥</div>
                <p className="text-slate-400 text-sm font-bold">還沒有和朋友一起運動的紀錄</p> 
                <p className="text-slate-300 text-xs mt-1">在「新增紀錄」時加入朋友名字即可</p>
             </div>
             : 
             <div className="grid grid-cols-2 gap-3">
               {sorted.map(([name, data]) => (
                  <button key={name} onClick={() => setSelectedFriend(name)} className="bg-white p-4 rounded-3xl border border-slate-100 flex flex-col items-center gap-2 shadow-sm active:scale-95 transition-transform">
                     <div className="w-12 h-12 rounded-full bg-blue-100 text-blue-500 flex items-center justify-center font-black text-lg uppercase">{name[0]}</div>
                     <div className="font-bold text-slate-800">{name}</div>
                     <div className="text-xs text-slate-400 font-bold bg-slate-50 px-2 py-1 rounded-full">{data.count} 次運動</div>
                  </button>
               ))}
             </div>
           }
        </div>
      );
    };

    const App = () => {
      const [view, setView] = useState('dashboard');
      const [logs, setLogs] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch(e) { return []; }
      });
      const [editLog, setEditLog] = useState(null);
      const [user, setUser] = useState(null);
      const [status, setStatus] = useState('初始化...');
      
      // New AI State in App level (Persistence)
      const [aiAdvice, setAiAdvice] = useState(null);
      const [aiLoading, setAiLoading] = useState(false);

      useEffect(() => {
        const fb = initFirebase();
        if(!fb) {
            setStatus('本地模式 (Firebase 未配置)');
            return;
        }
        
        getRedirectResult(fb.auth).then(res => {
          if(res) console.log('Redirect Success');
        }).catch(console.error);

        const unsub = onAuthStateChanged(fb.auth, async (u) => {
          setUser(u);
          if (u) {
            setStatus('連線中...');
            try {
               const docRef = doc(fb.db, "users", u.uid);
               onSnapshot(docRef, (docSnap) => {
                 if (docSnap.exists() && docSnap.data().logs) {
                    const cloudLogs = docSnap.data().logs;
                    setLogs(cloudLogs);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudLogs));
                    setStatus('已連線');
                 } else {
                    const local = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                    setDoc(docRef, { logs: local, updatedAt: new Date().toISOString() });
                    setStatus('已連線 (初始化)');
                 }
               });
            } catch(e) { console.error(e); setStatus('連線錯誤'); }
          } else {
             setStatus('本地模式');
          }
        });
        return () => unsub();
      }, []);

      // AI Logic Function
      const generateAiAdvice = async (currentLogs, forceRefresh = false) => {
        const todayStr = getLocalTodayString();
        
        // 1. Check Cache (if not forced)
        if (!forceRefresh) {
            const cached = localStorage.getItem(AI_CACHE_KEY);
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    // If the cached advice is from TODAY, use it
                    if (parsed.date === todayStr && parsed.advice) {
                        setAiAdvice(parsed.advice);
                        console.log("Using cached AI advice");
                        return;
                    }
                } catch(e) { console.error("Cache parse error", e); }
            }
        }

        if (!currentLogs || currentLogs.length === 0) {
            setAiAdvice("還沒有足夠的數據，請先記錄幾次運動！💪");
            return;
        }
        setAiLoading(true);
        try {
            const today = new Date();
            today.setHours(0,0,0,0);
            
            // 7 Days History
            const history = currentLogs
              .filter(l => l.status === 'completed' || !l.status) 
              .sort((a,b) => new Date(b.date) - new Date(a.date))
              .slice(0, 7)
              .map(l => `- ${l.date}: ${l.subcategory} (${l.durationMinutes}min) [RPE:${l.effort||'N/A'}]`);

            // 7 Days Future (Increased from 3)
            const futurePlans = currentLogs
              .filter(l => l.status === 'planned' && new Date(l.date) >= today)
              .sort((a,b) => new Date(a.date) - new Date(b.date))
              .slice(0, 7) 
              .map(l => `- ${l.date}: ${l.subcategory} (${l.startTime}-${l.endTime})`);

            const prompt = `
              Role: Professional Personal Trainer.
              User's Current Date: ${todayStr}

              [Past 7 Days History (Completed)]:
              ${history.join('\n') || "No recent history."}
              
              [Next 7 Days Plans (Future)]:
              ${futurePlans.join('\n') || "No future plans."}
              
              Task: Provide a 2-part analysis in Traditional Chinese (HK style).
              
              **IMPORTANT FORMATTING RULES**:
              1. You MUST start the first section with exactly: "Part 1: Today's Action"
              2. You MUST start the second section with exactly: "Part 2: Weekly Gap Analysis"
              
              Part 1: Today's Action (Status Check)
              - Based on yesterday's intensity and tomorrow's plans, should I rest or workout today?
              - Keep it short (1-2 sentences).
              
              Part 2: Weekly Gap Analysis
              - Look at the Next 7 Days Plans.
              - Identify days with NO plans or LONG gaps.
              - Suggest specific low-intensity activities or workouts to fill those gaps to maintain consistency without overtraining.
              
              Format: Use clear headings or bullet points. Use emojis.
            `;

            const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
            
            let adviceText = "";
            
            try {
              // Try the Experimental (2.0) Model first as requested
              const response = await ai.models.generateContent({
                model: "gemini-2.0-flash-exp", 
                contents: prompt,
              });
              adviceText = response.text;
            } catch (e) {
              console.warn("2.0 Flash failed, retrying with Stable Flash...", e);
              // Fallback to Stable Flash (1.5)
              try {
                  const response = await ai.models.generateContent({
                    model: "gemini-flash-latest", 
                    contents: prompt,
                  });
                  adviceText = response.text;
              } catch (e2) {
                  console.error("All AI models failed", e2);
                  setAiAdvice("連線不穩定，請稍後再試 (Model Error)");
                  return;
              }
            }
            
            if (adviceText) {
              setAiAdvice(adviceText);
              // 2. Save Cache
              localStorage.setItem(AI_CACHE_KEY, JSON.stringify({
                  date: todayStr,
                  advice: adviceText
              }));
            }
        } catch (error) {
            console.error("AI Error:", error);
            setAiAdvice("教練暫時斷線了，請稍後再試 😵‍💫");
        } finally {
            setAiLoading(false);
        }
      };

      // Initial AI Trigger (Only runs once if advice is empty and we have logs)
      useEffect(() => {
          if (logs.length > 0 && !aiAdvice && !aiLoading) {
              generateAiAdvice(logs);
          }
      }, [logs]); // Depend on logs so it triggers on first load, but check !aiAdvice to prevent loop

      const updateLogs = async (newLogs) => {
        setLogs(newLogs);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newLogs));
        if (user) {
          const fb = initFirebase();
          if(fb) {
            await setDoc(doc(fb.db, "users", user.uid), { logs: newLogs, updatedAt: new Date().toISOString() }, { merge: true });
          }
        }
      };

      const handleSave = (log) => {
        const updated = editLog ? logs.map(l => l.id === log.id ? log : l) : [log, ...logs];
        updateLogs(updated);
        setEditLog(null);
        setView('dashboard');
      };

      const handleDelete = (id) => {
        updateLogs(logs.filter(l => l.id !== id));
        setEditLog(null);
        setView('dashboard');
      };

      const handleAuth = async () => {
        const fb = initFirebase();
        if(!fb) { alert("Firebase 初始化失敗"); return; }
        
        if (user) {
            await signOut(fb.auth);
        } else {
           try {
               const provider = new GoogleAuthProvider();
               await signInWithPopup(fb.auth, provider);
           } catch(e) {
               console.error("Login Error", e);
               if(e.code === 'auth/unauthorized-domain') {
                   alert("登入失敗：目前的網域 (或IP) 未在 Firebase Console 授權。");
               } else {
                   alert("登入錯誤: " + e.message);
               }
           }
        }
      };

      return (
        <Layout activeView={view} setView={setView} user={user} status={status} onAuth={handleAuth}>
          {view === 'dashboard' && (
             <Dashboard 
                logs={logs} 
                setView={setView} 
                onEdit={(l)=>{setEditLog(l); setView('add');}} 
                aiAdvice={aiAdvice}
                aiLoading={aiLoading}
                onRefreshAi={() => generateAiAdvice(logs, true)}
             />
          )}
          {view === 'trends' && <Trends logs={logs} />}
          {view === 'calendar' && <Calendar logs={logs} onEdit={(l)=>{setEditLog(l); setView('add');}} />}
          {view === 'friends' && <FriendsView logs={logs} />}
          {view === 'add' && <Form onSave={handleSave} onCancel={()=>{setEditLog(null); setView('dashboard');}} onDelete={handleDelete} initData={editLog} logs={logs} />}
          {view === 'settings' && <Settings user={user} handleAuth={handleAuth} setView={setView} />}
        </Layout>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
