<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FitTrack 運動日常</title>
  <meta name="description" content="一個全功能的運動追蹤應用程式">
  
  <!-- PWA & Mobile Settings -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FitTrack">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- vConsole for Mobile Debugging -->
  <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
  <script>
    // Initialize vConsole immediately
    var vConsole = new VConsole();
    console.log('[System] vConsole initialized');
    window.onerror = function(msg, url, line, col, error) {
      console.error('[Global Error]', msg, 'Line:', line, 'Error:', error);
    };
  </script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      /* Prevent pull-to-refresh on mobile */
      overscroll-behavior-x: none;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    
    /* Modal Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-scale-up { animation: scaleUp 0.2s ease-out forwards; }

    .safe-area-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }

    input[type="date"] {
      position: relative;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }
  </style>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import ReactDOM from 'react-dom/client';
    import { initializeApp, getApps, getApp } from 'firebase/app';
    import { getFirestore, doc, setDoc, onSnapshot, getDoc } from 'firebase/firestore';
    import { 
      getAuth, 
      onAuthStateChanged, 
      signInWithPopup,
      signInWithRedirect,
      getRedirectResult,
      signOut, 
      GoogleAuthProvider, 
      setPersistence, 
      browserLocalPersistence 
    } from 'firebase/auth';

    console.log('[App] Modules loaded');

    const CATEGORIES = [
      { value: 'Gym', subcategories: ['功能性訓練', '重量訓練', '帶氧運動', 'HIIT', '伸展'], color: 'bg-blue-500', icon: '💪' },
      { value: '羽毛球', subcategories: ['友誼賽', '技術練習', '正式比賽', '單打', '雙打'], color: 'bg-green-500', icon: '🏸' },
      { value: '排球', subcategories: ['打比賽', '隊訓', '街場', '技術訓練'], color: 'bg-orange-500', icon: '🏐' },
      { value: '跑步', subcategories: ['慢跑', '長跑', '衝刺練習', '馬拉松訓練'], color: 'bg-red-500', icon: '🏃' },
      { value: '游泳', subcategories: ['自由式', '蛙式', '蝶式', '背泳'], color: 'bg-cyan-500', icon: '🏊' },
      { value: '瑜伽', subcategories: ['哈達瑜伽', '流瑜伽', '陰瑜伽', '普拉提'], color: 'bg-purple-500', icon: '🧘' },
      { value: '其他', subcategories: ['自定義項目'], color: 'bg-slate-500', icon: '✨' },
    ];

    const firebaseConfig = {
      apiKey: "AIzaSyCxrAn6x69Ki4c-MTrpBhyGnX2XFKW2f4k",
      authDomain: "fittracker-chunlam252.firebaseapp.com",
      projectId: "fittracker-chunlam252",
      storageBucket: "fittracker-chunlam252.firebasestorage.app",
      messagingSenderId: "629880531604",
      appId: "1:629880531604:web:76fd44292a79fbdad86281"
    };

    const STORAGE_KEY = 'fittrack_logs_v1';
    const REDIRECT_PENDING_KEY = 'auth_redirect_pending';
    const AUTH_MODE_PREF_KEY = 'auth_mode_pref'; // 'popup' or 'redirect'

    let db, auth, googleProvider;

    const initFirebase = () => {
      try {
        const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        googleProvider = new GoogleAuthProvider();
        console.log('[Firebase] Initialized successfully');
        return { auth, db, googleProvider };
      } catch (e) {
        console.error("[Firebase] Init Error:", e);
        return null; 
      }
    };

    // --- COMPONENTS ---

    const Layout = ({ children, activeView, setView, user, handleAuth, status, retryMode }) => {
      let dotColor = 'bg-slate-300';
      let textColor = 'text-slate-400';

      if (status.includes('失敗') || status.includes('錯誤') || status.includes('未授權') || status.includes('阻擋') || status.includes('失效')) {
        dotColor = 'bg-red-500';
        textColor = 'text-red-500 font-bold';
      } else if (status.includes('同步') || status.includes('已連線') || status.includes('成功')) {
        dotColor = 'bg-green-500';
        textColor = 'text-green-600';
      } else if (status.includes('處理中') || status.includes('上傳') || status.includes('刪除') || status.includes('合併') || status.includes('轉向') || status.includes('檢查') || status.includes('開啟') || status.includes('驗證')) {
        dotColor = 'bg-yellow-400 animate-pulse';
        textColor = 'text-yellow-600';
      } else if (status.includes('連線') || status.includes('登入')) {
        dotColor = 'bg-blue-500 animate-pulse';
        textColor = 'text-blue-600';
      }

      return (
        <div className="flex flex-col h-[100dvh] max-w-md mx-auto bg-white shadow-2xl relative overflow-hidden border-x border-slate-100">
          <header className="px-6 py-4 bg-white/90 backdrop-blur border-b border-slate-100 z-30 flex justify-between items-center shrink-0">
            <div>
              <h1 className="text-xl font-black text-slate-800 tracking-tight flex items-center gap-2">
                FitTrack <span className="text-xs font-normal text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">v4.28 UX+</span>
              </h1>
              <div className="flex items-center gap-1.5 mt-1">
                <span className={`w-2 h-2 rounded-full transition-colors duration-300 ${dotColor}`}></span>
                <p className={`text-[9px] font-black uppercase tracking-widest transition-colors duration-300 ${textColor} max-w-[200px] truncate`}>
                  {status}
                </p>
              </div>
            </div>
            {status.includes('未授權') && (
              <div className="text-[8px] bg-red-50 text-red-600 p-1 px-2 rounded-md font-bold max-w-[120px] leading-tight">
                請在 Firebase 加入此網域
              </div>
            )}
          </header>

          <main className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50 relative">
            {children}
          </main>

          <nav className="shrink-0 bg-white border-t border-slate-100 grid grid-cols-5 items-end pb-6 pt-2 px-2 z-30 safe-area-pb shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
            <NavBtn active={activeView === 'dashboard'} onClick={() => setView('dashboard')} icon="home" label="主頁" />
            <NavBtn active={activeView === 'trends'} onClick={() => setView('trends')} icon="chart" label="統計" />
            <div className="flex justify-center -mt-12 relative z-10 pointer-events-none">
              <button onClick={() => setView('add')} className="pointer-events-auto flex flex-col items-center group active:scale-95 transition-transform">
                <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-blue-200 border-[6px] border-white ring-1 ring-slate-100">
                  <span className="text-2xl">+</span>
                </div>
                <span className="text-[10px] font-bold text-blue-600 mt-1">紀錄</span>
              </button>
            </div>
            <NavBtn active={activeView === 'calendar'} onClick={() => setView('calendar')} icon="calendar" label="日曆" />
            <button onClick={handleAuth} className={`flex flex-col items-center gap-1 py-2 transition-all ${user ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
              <div className="h-6 flex items-center justify-center">
                {user?.photoURL ? (
                  <img src={user.photoURL} className={`w-6 h-6 rounded-full border border-slate-200 ${user ? 'ring-2 ring-blue-100' : ''}`} alt="User" />
                ) : (
                  <svg className={`w-6 h-6 ${retryMode && !user ? 'text-red-500 animate-bounce' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                )}
              </div>
              <span className={`text-[10px] font-bold ${retryMode && !user ? 'text-red-500' : ''}`}>{user ? '帳戶' : (retryMode ? '重試' : '登入')}</span>
            </button>
          </nav>
        </div>
      );
    };

    const NavBtn = ({ active, onClick, icon, label }) => {
      const icons = {
        home: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
        chart: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
        calendar: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
      };
      return (
        <button onClick={onClick} className={`flex flex-col items-center gap-1 py-2 transition-all ${active ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
          <div className="h-6 flex items-center justify-center">{icons[icon]}</div>
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      );
    };

    const Dashboard = ({ logs, onEdit, setView }) => {
      const sorted = [...logs].sort((a,b) => new Date(b.date) - new Date(a.date));
      const last = sorted[0];
      const daysSince = last ? Math.floor((new Date() - new Date(last.date))/(86400000)) : '-';
      const now = new Date();
      const currentYear = now.getFullYear();
      const yearLogs = logs.filter(l => new Date(l.date).getFullYear() === currentYear);
      const uniqueDaysThisYear = new Set(yearLogs.map(l => l.date.split('T')[0])).size;
      const startOfWeek = new Date(now);
      startOfWeek.setDate(now.getDate() - now.getDay());
      startOfWeek.setHours(0,0,0,0);
      const thisWeekCount = logs.filter(l => new Date(l.date) >= startOfWeek).length;
      
      const last5 = sorted.slice(0, 5);
      const moodMap = { '🤩': 5, '😊': 4, '😐': 3, '😫': 2, '😡': 1 };
      let moodText = '暫無';
      if(last5.length > 0) {
        const total = last5.reduce((acc, l) => acc + (moodMap[l.mood] || 3), 0);
        const avgMoodScore = total / last5.length;
        if (avgMoodScore >= 4.5) moodText = '🤩 絕佳';
        else if (avgMoodScore >= 3.5) moodText = '😊 不錯';
        else if (avgMoodScore >= 2.5) moodText = '😐 普通';
        else if (avgMoodScore >= 1.5) moodText = '😫 疲累';
        else moodText = '😡 糟糕';
      }

      const getCategoryStats = (cat) => {
        const catLogs = logs.filter(l => l.category === cat).sort((a,b) => new Date(b.date) - new Date(a.date));
        if (catLogs.length === 0) return { days: null, text: '無紀錄', color: 'text-slate-300' };
        const diff = Math.floor((new Date() - new Date(catLogs[0].date))/(86400000));
        let text = `${diff} 天前`;
        let color = 'text-slate-500';
        if (diff === 0) { text = '今天'; color = 'text-green-500'; }
        else if (diff === 1) { text = '昨天'; color = 'text-blue-500'; }
        else if (diff > 14) { text = `${diff} 天沒做!`; color = 'text-red-500 font-bold'; }
        else if (diff > 7) { text = `${diff} 天前`; color = 'text-orange-500'; }
        return { days: diff, text, color };
      };

      return (
        <div className="p-6 space-y-6 animate-slide-up">
          <div className="bg-slate-900 rounded-[2rem] p-6 text-white shadow-xl shadow-slate-200 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full blur-[60px] opacity-20"></div>
            <div className="relative z-10 grid grid-cols-2 gap-8">
              <div>
                <div className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">上次運動</div>
                <div className="text-4xl font-black">{daysSince}<span className="text-sm text-slate-500 ml-1">天前</span></div>
                <div className="mt-4">
                   <div className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">本週次數</div>
                   <div className="text-xl font-bold text-slate-200">{thisWeekCount} <span className="text-xs font-normal">次</span></div>
                </div>
              </div>
              <div className="border-l border-white/10 pl-8 flex flex-col justify-between">
                <div>
                  <div className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">本年活躍</div>
                  <div className="text-3xl font-black text-blue-400">{uniqueDaysThisYear}<span className="text-sm text-slate-500 ml-1">日</span></div>
                </div>
                <div>
                   <div className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">近期心情</div>
                   <div className="text-lg font-bold">{moodText}</div>
                </div>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-3">
            {['Gym','羽毛球','排球'].map(cat => {
              const c = CATEGORIES.find(x=>x.value===cat);
              const stats = getCategoryStats(cat);
              return (
                <div key={cat} className="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center gap-1">
                  <span className="text-2xl">{c.icon}</span>
                  <span className="text-[10px] font-bold text-slate-500">{cat}</span>
                  <span className={`text-[10px] font-black ${stats.color}`}>{stats.text}</span>
                </div>
              )
            })}
          </div>

          <div>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">最近活動</h3>
              <button onClick={()=>setView('calendar')} className="text-xs font-bold text-blue-600">查看全部</button>
            </div>
            <div className="space-y-3">
              {sorted.slice(0,5).map(l => {
                const c = CATEGORIES.find(x=>x.value===l.category);
                return (
                  <div key={l.id} onClick={()=>onEdit(l)} className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer">
                    <div className={`w-12 h-12 rounded-2xl ${c?.color} flex items-center justify-center text-xl text-white shadow-inner`}>{c?.icon}</div>
                    <div className="flex-1">
                      <h4 className="font-bold text-slate-800 text-sm">{l.subcategory}</h4>
                      <div className="text-[10px] font-bold text-slate-400 uppercase mt-0.5 flex flex-wrap gap-2 items-center">
                        <span>{new Date(l.date).toLocaleDateString()} • {l.durationMinutes} min • {l.mood || '😐'}</span>
                      </div>
                      {l.friends && l.friends.length > 0 && (
                        <div className="mt-2 flex items-center gap-1.5 flex-wrap">
                          <span className="text-[10px] text-slate-400">👥</span>
                          {l.friends.slice(0, 2).map(f => (
                            <span key={f} className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-blue-50 text-blue-600">
                              {f}
                            </span>
                          ))}
                          {l.friends.length > 2 && (
                             <span className="inline-flex items-center px-1.5 py-0.5 rounded-full text-[10px] font-bold bg-slate-100 text-slate-500 border border-slate-200">
                               +{l.friends.length - 2}
                             </span>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                )
              })}
              {logs.length===0 && <div className="text-center py-10 text-slate-400 text-sm">暫無紀錄</div>}
            </div>
          </div>
        </div>
      )
    };

    const Trends = ({ logs }) => {
      const last7 = Array.from({length:7}).map((_,i) => {
        const d = new Date(); d.setDate(d.getDate() - (6-i));
        const dateStr = d.toISOString().split('T')[0];
        const mins = logs.filter(l=>l.date.startsWith(dateStr)).reduce((a,b)=>a+b.durationMinutes,0);
        return { day: d.getDate(), mins, isToday: i===6 };
      });
      const maxWeekly = Math.max(...last7.map(d=>d.mins), 60);

      const currentYear = new Date().getFullYear();
      const yearLogs = logs.filter(l => new Date(l.date).getFullYear() === currentYear);
      const breakdown = CATEGORIES.map(cat => {
        const catLogs = yearLogs.filter(l => l.category === cat.value);
        const totalMinutes = catLogs.reduce((a,b)=>a+b.durationMinutes, 0);
        const count = catLogs.length;
        return { ...cat, totalMinutes, count, hours: (totalMinutes/60).toFixed(1) };
      }).filter(c => c.totalMinutes > 0).sort((a,b) => b.totalMinutes - a.totalMinutes);
      const maxYearlyMinutes = Math.max(...breakdown.map(b => b.totalMinutes), 1);

      let streak = 0;
      const sortedDates = [...new Set(logs.map(l => l.date.split('T')[0]))].sort((a, b) => new Date(b) - new Date(a));
      if (sortedDates.length > 0) {
        const today = new Date().toISOString().split('T')[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        if (sortedDates[0] === today || sortedDates[0] === yesterday) {
          streak = 1;
          for (let i = 0; i < sortedDates.length - 1; i++) {
             const curr = new Date(sortedDates[i]);
             const prev = new Date(sortedDates[i+1]);
             if (Math.ceil(Math.abs(curr - prev) / (1000 * 60 * 60 * 24)) === 1) streak++;
             else break;
          }
        }
      }

      const friendStats = {};
      yearLogs.forEach(log => {
        if(log.friends && Array.isArray(log.friends)) {
          log.friends.forEach(f => {
            if (!friendStats[f]) friendStats[f] = { total: 0, cats: {} };
            friendStats[f].total += 1;
            friendStats[f].cats[log.category] = (friendStats[f].cats[log.category] || 0) + 1;
          });
        }
      });
      const topFriends = Object.entries(friendStats).sort((a,b) => b[1].total - a[1].total).slice(0, 5);

      return (
        <div className="p-6 space-y-8 animate-slide-up pb-24">
          <section className="grid grid-cols-2 gap-3">
             <StatCard title="連續紀錄" value={streak} unit="天" icon="🔥" color="text-orange-500" />
             <StatCard title="本年活躍" value={new Set(yearLogs.map(l => l.date.split('T')[0])).size} unit="日" icon="📈" color="text-green-500" />
          </section>

          {topFriends.length > 0 && (
            <section>
              <h3 className="text-lg font-black text-slate-800 mb-4">最佳拍檔</h3>
              <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                {topFriends.map(([name, stats], index) => (
                  <div key={name} className="flex items-start gap-4">
                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold shrink-0">{index+1}</div>
                    <div className="flex-1">
                      <div className="flex justify-between font-bold text-slate-700"><span>{name}</span><span>{stats.total} 次</span></div>
                      <div className="flex gap-2 mt-1">
                        {Object.entries(stats.cats).map(([cat, count]) => (
                          <span key={cat} className="text-[10px] bg-slate-50 px-1 py-0.5 rounded">{CATEGORIES.find(c=>c.value===cat)?.icon} x{count}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </section>
          )}

          <section>
            <h3 className="text-lg font-black text-slate-800 mb-4">過去 7 天 (分鐘)</h3>
            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 h-40 flex items-end justify-between gap-2">
               {last7.map((d,i) => (
                 <div key={i} className="flex-1 flex flex-col items-center gap-2 h-full justify-end">
                   <div style={{height: `${(d.mins/maxWeekly)*100}%`}} className={`w-full max-w-[12px] rounded-full min-h-[4px] ${d.isToday ? 'bg-blue-500' : 'bg-slate-100'}`}></div>
                   <span className="text-[10px] font-bold text-slate-400">{d.day}</span>
                 </div>
               ))}
            </div>
          </section>
        </div>
      );
    }

    const StatCard = ({ title, value, unit, icon, color }) => (
      <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm relative overflow-hidden h-24">
        <div className="absolute right-0 top-0 text-4xl opacity-5">{icon}</div>
        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{title}</div>
        <div className={`text-2xl font-black mt-1 ${color}`}>{value}<span className="text-xs ml-1 text-slate-400">{unit}</span></div>
      </div>
    );

    const Calendar = ({ logs, onEdit }) => {
      const [date, setDate] = useState(new Date());
      const [sel, setSel] = useState(new Date().toISOString().split('T')[0]);
      const daysInMonth = new Date(date.getFullYear(), date.getMonth()+1, 0).getDate();
      const firstDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
      const days = Array(firstDay).fill(null).concat([...Array(daysInMonth).keys()].map(i=>i+1));
      const dayLogs = logs.filter(l=>l.date.startsWith(sel));

      return (
        <div className="p-6 animate-slide-up pb-24">
           <div className="flex justify-between items-center mb-6">
             <h2 className="text-xl font-black text-slate-800">{date.toLocaleString('zh-HK',{month:'long',year:'numeric'})}</h2>
             <div className="flex gap-2">
               <button onClick={()=>setDate(new Date(date.getFullYear(),date.getMonth()-1,1))} className="p-2 border rounded-lg text-slate-500">←</button>
               <button onClick={()=>setDate(new Date(date.getFullYear(),date.getMonth()+1,1))} className="p-2 border rounded-lg text-slate-500">→</button>
             </div>
           </div>
           <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-7 gap-1">
             {['日','一','二','三','四','五','六'].map(d=><div key={d} className="text-center text-[10px] font-black text-slate-400 py-1">{d}</div>)}
             {days.map((d,i) => {
               if(!d) return <div key={i}></div>;
               const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
               const logsForDay = logs.filter(l=>l.date.startsWith(ds));
               return (
                 <button key={i} onClick={()=>setSel(ds)} className={`aspect-square rounded-xl flex flex-col items-center justify-center relative ${sel===ds ? 'bg-slate-800 text-white shadow-lg' : 'hover:bg-slate-50 text-slate-700'}`}>
                   <span className="text-xs font-bold">{d}</span>
                   {logsForDay.length > 0 && <span className="text-[10px] leading-none">{CATEGORIES.find(c=>c.value===logsForDay[0].category)?.icon}</span>}
                 </button>
               )
             })}
           </div>
           <div className="mt-6 space-y-3">
             {dayLogs.map(l => (
               <div key={l.id} onClick={()=>onEdit(l)} className="bg-white p-4 rounded-3xl border border-slate-100 flex items-center gap-4 cursor-pointer">
                 <div className={`w-10 h-10 rounded-xl ${CATEGORIES.find(c=>c.value===l.category)?.color} flex items-center justify-center text-lg text-white`}>{CATEGORIES.find(c=>c.value===l.category)?.icon}</div>
                 <div className="flex-1"><div className="font-bold text-slate-800 text-sm">{l.subcategory}</div><div className="text-[10px] text-slate-400">{l.durationMinutes} min</div></div>
               </div>
             ))}
           </div>
        </div>
      )
    }

    const Form = ({ onSave, onCancel, onDelete, initData, allLogs }) => {
      const [data, setData] = useState(() => {
        const defaults = { 
            category: 'Gym', 
            subcategory: '重量訓練', 
            date: new Date().toISOString().split('T')[0], 
            durationMinutes: 60, 
            effort: 5, 
            performance: 7, // Updated default to 7 for 1-10 scale
            mood: '😊', 
            friends: [] 
        };
        
        if (!initData) return defaults;

        // Merge defaults to handle missing fields (like friends) in old data
        const merged = { ...defaults, ...initData };
        
        // Safety: Ensure category is valid (in case of legacy data with deleted categories)
        if (!CATEGORIES.find(c => c.value === merged.category)) {
             merged.category = 'Gym';
             merged.subcategory = '重量訓練';
        }
        
        // Safety: Ensure friends is an array
        if (!Array.isArray(merged.friends)) {
            merged.friends = [];
        }

        return merged;
      });
      const [friendInput, setFriendInput] = useState('');
      const suggestedFriends = React.useMemo(() => {
        const counts = {};
        (allLogs || []).forEach(l => l.friends?.forEach(f => counts[f] = (counts[f] || 0) + 1));
        return Object.keys(counts).sort((a,b) => counts[b] - counts[a]).slice(0, 8);
      }, [allLogs]);

      return (
        <div className="p-6 animate-slide-up pb-24 space-y-6">
          <div className="flex justify-between items-center"><h2 className="text-2xl font-black">{initData?'編輯':'新增'}</h2><button onClick={onCancel} className="w-8 h-8 flex items-center justify-center bg-white rounded-full border">✕</button></div>
          <div className="grid grid-cols-4 gap-2">
            {CATEGORIES.map(c => (
              <button key={c.value} onClick={()=>setData({...data, category:c.value, subcategory:c.subcategories[0]})} className={`p-2 rounded-2xl border-2 transition-all ${data.category===c.value ? 'border-slate-800 bg-white' : 'border-transparent bg-white opacity-40'}`}>
                <div className="text-2xl">{c.icon}</div>
              </button>
            ))}
          </div>
          <div className="bg-white p-5 rounded-3xl space-y-4 border border-slate-100">
             <div><label className="text-[10px] font-black text-slate-400 uppercase">項目</label>
             <select value={data.subcategory} onChange={e=>setData({...data, subcategory:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900">{CATEGORIES.find(c=>c.value===data.category).subcategories.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
             <div className="grid grid-cols-2 gap-4">
               <div><label className="text-[10px] font-black text-slate-400 uppercase">日期</label><input type="date" value={data.date} onChange={e=>setData({...data, date:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900" /></div>
               <div>
                 <label className="text-[10px] font-black text-slate-400 uppercase">時長</label>
                 <select value={data.durationMinutes} onChange={e=>setData({...data, durationMinutes:Number(e.target.value)})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900">
                    <option value={15}>15 min</option>
                    <option value={30}>30 min</option>
                    <option value={45}>45 min</option>
                    <option value={60}>1 小時</option>
                    <option value={90}>1.5 小時</option>
                    <option value={120}>2 小時</option>
                    <option value={150}>2.5 小時</option>
                    <option value={180}>3 小時</option>
                    <option value={210}>3.5 小時</option>
                    <option value={240}>4 小時</option>
                 </select>
               </div>
             </div>
          </div>

          <div className="bg-white p-5 rounded-3xl space-y-4 border border-slate-100">
            <div>
              <div className="flex justify-between mb-1">
                <label className="text-[10px] font-black text-slate-400 uppercase">訓練強度 (RPE)</label>
                <span className="text-xs font-bold text-slate-600">{data.effort} / 10</span>
              </div>
              <input type="range" min="1" max="10" value={data.effort} onChange={e=>setData({...data, effort:Number(e.target.value)})} className="w-full h-8 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" style={{ touchAction: 'none' }} />
              <div className="flex justify-between text-[10px] text-slate-400 mt-1"><span>輕鬆</span><span>極限</span></div>
            </div>

            <div>
              <div className="flex justify-between mb-1">
                 <label className="text-[10px] font-black text-slate-400 uppercase">狀態表現 (Performance)</label>
                 <span className="text-xs font-bold text-slate-600">{data.performance} / 10</span>
              </div>
              <input type="range" min="1" max="10" value={data.performance} onChange={e=>setData({...data, performance:Number(e.target.value)})} className="w-full h-8 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-green-500" style={{ touchAction: 'none' }} />
              <div className="flex justify-between text-[10px] text-slate-400 mt-1"><span>不在狀態</span><span>超水準</span></div>
            </div>
          </div>

          <div className="bg-white p-5 rounded-3xl border border-slate-100">
            <label className="text-[10px] font-black text-slate-400 uppercase">訓練心情</label>
            <div className="flex justify-between mt-2">
              {['🤩','😊','😐','😫','😡'].map(m => (
                 <button key={m} onClick={()=>setData({...data, mood:m})} className={`text-2xl p-2 rounded-xl transition-all ${data.mood===m ? 'bg-slate-100 scale-125' : 'opacity-50 grayscale'}`}>{m}</button>
              ))}
            </div>
          </div>

          <div className="bg-white p-5 rounded-3xl border border-slate-100">
             <label className="text-[10px] font-black text-slate-400 uppercase">同行夥伴</label>
             <div className="flex gap-2 mt-2">
               <input type="text" value={friendInput} onChange={e=>setFriendInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){const v=friendInput.trim(); if(v&&!data.friends.includes(v)) setData({...data, friends:[...data.friends,v]}); setFriendInput('');}}} placeholder="輸入名字..." className="flex-1 p-3 bg-slate-50 rounded-xl text-sm text-slate-900 font-bold" />
               <button onClick={()=>{const v=friendInput.trim(); if(v&&!data.friends.includes(v)) setData({...data, friends:[...data.friends,v]}); setFriendInput('');}} className="bg-slate-900 text-white px-4 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-transform">
                 <span className="text-xl leading-none mb-0.5">+</span>
               </button>
             </div>
             <div className="flex flex-wrap gap-2 mt-3">{data.friends.map(f=><span key={f} onClick={()=>setData({...data, friends:data.friends.filter(x=>x!==f)})} className="bg-blue-600 text-white px-2 py-1 rounded-lg text-xs font-bold cursor-pointer">{f} ✕</span>)}</div>
             <div className="mt-3 flex flex-wrap gap-1.5">{suggestedFriends.filter(f=>!data.friends.includes(f)).map(f=><button key={f} onClick={()=>setData({...data, friends:[...data.friends,f]})} className="text-[10px] border px-2 py-1 rounded-full text-slate-500">+ {f}</button>)}</div>
          </div>
          <button onClick={()=>onSave({...data, id:initData?.id||Date.now().toString()})} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black shadow-xl">儲存紀錄</button>
          {initData && <button onClick={()=>onDelete(initData.id)} className="w-full text-red-500 font-bold text-sm">刪除此紀錄</button>}
        </div>
      )
    }

    const App = () => {
      const [view, setView] = useState('dashboard');
      const [logs, setLogs] = useState(() => {
        try {
          const local = localStorage.getItem(STORAGE_KEY);
          return local ? JSON.parse(local) : [];
        } catch(e) { return []; }
      });
      const [editLog, setEditLog] = useState(null);
      const [user, setUser] = useState(null);
      const [loginRetryMode, setLoginRetryMode] = useState(false);
      
      const [isRedirectChecking, setIsRedirectChecking] = useState(() => {
        const isPending = !!sessionStorage.getItem(REDIRECT_PENDING_KEY);
        console.log('[App] Initial Redirect Check. Pending Key:', isPending);
        return isPending;
      });
      
      const [status, setStatus] = useState(() => {
        return sessionStorage.getItem(REDIRECT_PENDING_KEY) ? '驗證身分中 (請稍候)...' : '初始化';
      });

      useEffect(() => {
        console.log('[Effect] Main Auth Effect Started');
        const fb = initFirebase();
        if(fb) {
          // 1. 如果是 Redirect 回來，強制顯示驗證訊息
          if (sessionStorage.getItem(REDIRECT_PENDING_KEY)) {
             console.log('[Effect] Found pending key, waiting for redirect result');
             setStatus('驗證身分中 (Google 回傳)...');
          }

          // 2. 處理 Redirect 結果
          getRedirectResult(fb.auth)
            .then((result) => {
              if (result) {
                console.log('[Auth] Redirect Result Success:', result.user.uid);
                setStatus('登入成功 (轉向)');
                // 成功後，清除任何錯誤偏好
                localStorage.removeItem(AUTH_MODE_PREF_KEY);
                setLoginRetryMode(false);
              } else {
                console.log('[Auth] Redirect Result: Null');
                // 關鍵修改：如果有 Pending Key 但是 Result 是 Null，代表轉向失敗
                if (sessionStorage.getItem(REDIRECT_PENDING_KEY)) {
                   console.warn('[Auth] Redirect failed. Permanently switching to Popup mode for this device.');
                   
                   // 永久記住這個錯誤，下次直接用 Popup
                   localStorage.setItem(AUTH_MODE_PREF_KEY, 'popup');
                   
                   setStatus('轉向失效 (已切換模式)');
                   setLoginRetryMode(true);
                   alert('偵測到瀏覽器限制導致轉向登入失敗。\n\n系統已自動切換為「彈出視窗模式」。\n請再次點擊登入按鈕即可。');
                }
              }
            })
            .catch((error) => {
               console.error('[Auth] Redirect Error:', error);
               if (error.code !== 'auth/popup-closed-by-user') {
                  setStatus('登入錯誤: ' + error.message);
               }
            })
            .finally(() => {
               console.log('[Auth] Redirect check finished. Removing key.');
               sessionStorage.removeItem(REDIRECT_PENDING_KEY);
               setIsRedirectChecking(false);
            });

          // 3. 監聽 Auth 變化
          const unsubscribe = onAuthStateChanged(fb.auth, async (u) => {
            console.log('[Auth] AuthStateChanged:', u ? `User ${u.uid}` : 'No User');
            setUser(u);
            const localRaw = localStorage.getItem(STORAGE_KEY);
            const localLogs = localRaw ? JSON.parse(localRaw) : [];
            
            if(!u) {
              setLogs(localLogs);
              const hasPendingKey = !!sessionStorage.getItem(REDIRECT_PENDING_KEY);
              // 如果處於重試模式，顯示特定狀態
              if (loginRetryMode) {
                 setStatus('驗證失效 (請重試)');
              } else if (!hasPendingKey && !status.includes('錯誤')) {
                 setStatus('本地模式 (未登入)');
              }
            } else {
              // 登入成功
              sessionStorage.removeItem(REDIRECT_PENDING_KEY);
              setIsRedirectChecking(false);
              setLoginRetryMode(false);

              setStatus('連線中 (準備合併)...');
              try {
                const userRef = doc(fb.db, "users", u.uid);
                const snapshot = await getDoc(userRef);
                
                let finalLogs = [];

                if (snapshot.exists()) {
                  const cloudLogs = snapshot.data().logs || [];
                  const cloudIds = new Set(cloudLogs.map(l => l.id));
                  const uniqueLocals = localLogs.filter(l => !cloudIds.has(l.id));
                  
                  if (uniqueLocals.length > 0) {
                    setStatus('發現新紀錄，正在合併...');
                    finalLogs = [...cloudLogs, ...uniqueLocals];
                    await setDoc(userRef, { logs: finalLogs, updatedAt: new Date().toISOString() }, { merge: true });
                  } else {
                    finalLogs = cloudLogs;
                  }
                } else {
                  console.log('[DB] Creating new user doc');
                  if (localLogs.length > 0) {
                     await setDoc(userRef, { logs: localLogs, updatedAt: new Date().toISOString() });
                  }
                  finalLogs = localLogs;
                }

                setLogs(finalLogs);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(finalLogs));
                
                onSnapshot(userRef, (doc) => {
                  if(doc.exists() && doc.data().logs) {
                    const newCloudLogs = doc.data().logs;
                    setLogs(prev => {
                       if (JSON.stringify(prev) !== JSON.stringify(newCloudLogs)) {
                         localStorage.setItem(STORAGE_KEY, JSON.stringify(newCloudLogs));
                         return newCloudLogs;
                       }
                       return prev;
                    });
                    setStatus('已連線 (雲端同步)');
                  } else {
                    setStatus('已連線 (無數據)');
                  }
                });
              } catch (err) {
                console.error('[DB] Error during sync:', err);
                setStatus('資料庫連線錯誤');
              }
            }
          });
          
          return () => unsubscribe();
        }
      }, []); // Removed [loginRetryMode] dependency to fix double-run issue

      useEffect(() => {
         const hasPendingKey = !!sessionStorage.getItem(REDIRECT_PENDING_KEY);
         if (!isRedirectChecking && !user && !status.includes('錯誤') && !hasPendingKey && !loginRetryMode) {
            setStatus('本地模式 (未登入)');
         }
      }, [isRedirectChecking, user, loginRetryMode]);

      const save = async (log) => {
        const newLogs = editLog ? logs.map(l=>l.id===log.id?log:l) : [log, ...logs];
        setLogs(newLogs);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newLogs));
        if(user) {
          setStatus('處理中 (雲端上傳)');
          const fb = initFirebase();
          try {
             await setDoc(doc(fb.db, "users", user.uid), { logs: newLogs, updatedAt: new Date().toISOString() }, { merge: true });
             setStatus('雲端已同步');
          } catch (e) { 
             console.error('[Save] Error:', e);
             setStatus('同步錯誤 (網絡不穩)'); 
          }
        }
        setEditLog(null); setView('dashboard');
      };

      const removeLog = async (id) => {
        const newLogs = logs.filter(l => l.id !== id);
        setLogs(newLogs);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newLogs));
        if(user) {
          setStatus('處理中 (雲端刪除)');
          const fb = initFirebase();
          try {
             await setDoc(doc(fb.db, "users", user.uid), { logs: newLogs, updatedAt: new Date().toISOString() }, { merge: true });
             setStatus('雲端已同步');
          } catch (e) { 
             console.error('[Delete] Error:', e);
             setStatus('同步刪除錯誤'); 
          }
        }
        setEditLog(null); setView('dashboard');
      };

      const handleAuth = async (e) => {
        if (e) e.preventDefault(); 
        
        // 點擊登入時，先清除任何可能殘留的 pending key
        sessionStorage.removeItem(REDIRECT_PENDING_KEY);
        
        const fb = initFirebase();
        if(!fb) return;
        
        try {
          if(user) {
             console.log('[Auth] Signing out');
             await signOut(fb.auth);
             setStatus('本地模式 (已登出)');
             setLoginRetryMode(false);
          } else {
             console.log('[Auth] Signing in');
             await setPersistence(fb.auth, browserLocalPersistence);
             const provider = new GoogleAuthProvider();
             
             const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
             // 檢查是否有永久偏好設定
             const preferredMode = localStorage.getItem(AUTH_MODE_PREF_KEY);
             console.log('[Auth] Device mobile:', isMobile, 'Pref:', preferredMode);
             
             // 如果在重試模式，或者不是手機，或者已儲存偏好為 popup，都使用 Popup
             if (loginRetryMode || !isMobile || preferredMode === 'popup') {
                console.log('[Auth] Starting Popup Flow (Force/Desktop/Pref)');
                setStatus('正在開啟 Google 登入視窗...');
                await signInWithPopup(fb.auth, provider);
             } else {
                console.log('[Auth] Starting Redirect Flow (Mobile Default)');
                sessionStorage.setItem(REDIRECT_PENDING_KEY, 'true');
                setStatus('正在轉向 Google 登入...');
                setIsRedirectChecking(true);
                await signInWithRedirect(fb.auth, provider);
             }
          }
        } catch (error) {
          console.error('[Auth] Login Error:', error);
          setIsRedirectChecking(false);
          sessionStorage.removeItem(REDIRECT_PENDING_KEY);

          if (error.code === 'auth/popup-closed-by-user') {
            setStatus('登入已取消');
            return;
          }
          if (error.code === 'auth/popup-blocked') {
             console.warn('[Auth] Popup Blocked');
             alert('彈出視窗被阻擋。請在瀏覽器設定中允許彈出視窗。');
             return;
          }
          
          if (error.code === 'auth/unauthorized-domain') {
            const msg = '錯誤: 此網域未獲授權。請在 Firebase Console 加入此網域。';
            setStatus('網域未授權');
            alert(msg);
          } else {
            const msg = '登入失敗: ' + (error.message || '未知錯誤');
            setStatus('登入失敗');
            alert(msg);
          }
        }
      }

      return (
        <Layout activeView={view} setView={setView} user={user} handleAuth={handleAuth} status={status} retryMode={loginRetryMode}>
          {view === 'dashboard' && <Dashboard logs={logs} setView={setView} onEdit={(l)=>{setEditLog(l); setView('add');}} />}
          {view === 'trends' && <Trends logs={logs} />}
          {view === 'calendar' && <Calendar logs={logs} onEdit={(l)=>{setEditLog(l); setView('add');}} />}
          {view === 'add' && <Form onSave={save} onCancel={()=>{setEditLog(null); setView('dashboard');}} onDelete={removeLog} initData={editLog} allLogs={logs} />}
        </Layout>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
