    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-slow { animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    .safe-area-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  
  <!-- Import Map -->
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",

}
</script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import ReactDOM from 'react-dom/client';
    import { initializeApp, getApps, getApp } from 'firebase/app';
    import { getFirestore, doc, setDoc, onSnapshot, getDoc } from 'firebase/firestore';
    import { getAuth, onAuthStateChanged, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, GoogleAuthProvider } from 'firebase/auth';
    import { GoogleGenAI } from "@google/genai";

    const GEMINI_API_KEY = "AIzaSyAGe1-HT-X-SkbAkcFIvGr3cFr9EEYcxcQ";

    const CATEGORIES = [
      { value: 'Gym', subcategories: ['功能性訓練', '重量訓練', '帶氧運動', 'HIIT', '伸展'], color: 'bg-blue-500', text: 'text-blue-500', icon: '💪' },
      { value: '羽毛球', subcategories: ['友誼賽', '技術練習', '正式比賽', '單打', '雙打'], color: 'bg-green-500', text: 'text-green-500', icon: '🏸' },
      { value: '排球', subcategories: ['打比賽', '隊訓', '街場', '技術訓練'], color: 'bg-orange-500', text: 'text-orange-500', icon: '🏐' },
      { value: '跑步', subcategories: ['慢跑', '長跑', '衝刺練習', '馬拉松訓練'], color: 'bg-red-500', text: 'text-red-500', icon: '🏃' },
      { value: '拉筋', subcategories: ['晨間伸展', '睡前放鬆', '運動後拉筋', '滾筒放鬆', '動態伸展'], color: 'bg-indigo-500', text: 'text-indigo-500', icon: '🤸' },
      { value: '其他', subcategories: ['自定義項目'], color: 'bg-slate-500', text: 'text-slate-500', icon: '✨' },
    ];

    const firebaseConfig = {
      apiKey: "AIzaSyCxrAn6x69Ki4c-MTrpBhyGnX2XFKW2f4k",
      authDomain: "fittracker-chunlam252.firebaseapp.com",
      projectId: "fittracker-chunlam252",
      storageBucket: "fittracker-chunlam252.firebasestorage.app",
      messagingSenderId: "629880531604",
      appId: "1:629880531604:web:76fd44292a79fbdad86281"
    };

    const STORAGE_KEY = 'fittrack_logs_v2'; // Upgraded key for new data structure
    const REDIRECT_PENDING_KEY = 'auth_redirect_pending';
    
    // --- HELPER ---
    const getLocalTodayString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    const isFutureDate = (dateStr) => {
      const today = new Date();
      today.setHours(0,0,0,0);
      const target = new Date(dateStr);
      return target > today;
    };

    const calculateDuration = (start, end) => {
      if (!start || !end) return 0;
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      let diff = (eh * 60 + em) - (sh * 60 + sm);
      if (diff < 0) diff += 24 * 60; // Handle overnight
      return diff;
    };

    const initFirebase = () => {
      try {
        const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
        return { auth: getAuth(app), db: getFirestore(app) };
      } catch (e) { console.error(e); return null; }
    };

    // --- AI COMPONENT ---
    const SmartCoach = ({ logs }) => {
      const [advice, setAdvice] = useState(null);
      const [loading, setLoading] = useState(false);
      const hasFetched = useRef(false);

      useEffect(() => {
        if (hasFetched.current || logs.length === 0) return;
        
        const fetchAdvice = async () => {
          setLoading(true);
          try {
            // Prepare Data for AI
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const history = logs
              .filter(l => l.status === 'completed')
              .sort((a,b) => new Date(b.date) - new Date(a.date))
              .slice(0, 10) // Last 10 activities
              .map(l => `- ${l.date}: ${l.subcategory} (${l.durationMinutes}min), RPE:${l.effort}/10, Mood:${l.mood}`);

            const plan = logs
              .filter(l => l.status === 'planned' && new Date(l.date) >= today)
              .sort((a,b) => new Date(a.date) - new Date(b.date))
              .slice(0, 3) // Next 3 plans
              .map(l => `- ${l.date}: ${l.subcategory} (${l.durationMinutes}min)`);

            const prompt = `
              Role: Professional Sports Coach.
              Context:
              [History (Last 7-10 entries)]:
              ${history.join('\n')}
              
              [Future Plan (Next few days)]:
              ${plan.join('\n')}
              
              Task: Analyze the user's load. Give a specific recommendation for TODAY (Date: ${getLocalTodayString()}).
              Rules:
              1. If high load recently + hard plan tomorrow -> Suggest Rest/Light recovery.
              2. If low load -> Suggest specific workout.
              3. Keep it concise (max 2 sentences). Use Emoji. Be encouraging but scientific.
              4. Language: Traditional Chinese (Cantonese colloquial style is preferred).
            `;

            const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
            const model = ai.getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(prompt);
            const response = await result.response;
            setAdvice(response.text());
          } catch (error) {
            console.error("AI Error:", error);
            setAdvice("教練暫時休息中 (連線問題)");
          } finally {
            setLoading(false);
            hasFetched.current = true;
          }
        };

        fetchAdvice();
      }, [logs]); // Re-run if logs change dramatically, but useRef guards single execution per session usually

      if (!advice && !loading) return null;

      return (
        <div className="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-[2rem] p-5 text-white shadow-lg mb-6 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-24 h-24 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
          <div className="flex items-start gap-3 relative z-10">
            <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-xl shrink-0 backdrop-blur-sm">
              🤖
            </div>
            <div className="flex-1">
              <div className="text-[10px] font-bold text-indigo-100 uppercase tracking-widest mb-1">AI 智能教練</div>
              {loading ? (
                <div className="space-y-2 animate-pulse">
                  <div className="h-3 bg-white/20 rounded w-3/4"></div>
                  <div className="h-3 bg-white/20 rounded w-1/2"></div>
                </div>
              ) : (
                <p className="text-sm font-medium leading-relaxed">{advice}</p>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- MAIN APP COMPONENTS ---

    const Layout = ({ children, activeView, setView, user, status }) => (
      <div className="flex flex-col h-[100dvh] max-w-md mx-auto bg-white shadow-2xl relative overflow-hidden border-x border-slate-100">
        <header className="px-6 py-4 bg-white/90 backdrop-blur border-b border-slate-100 z-30 flex justify-between items-center shrink-0">
          <div>
            <h1 className="text-xl font-black text-slate-800 tracking-tight flex items-center gap-2">
              FitTrack <span className="text-xs font-normal text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">AI Edition</span>
            </h1>
            <div className="flex items-center gap-1.5 mt-1">
              <div className={`w-1.5 h-1.5 rounded-full ${status.includes('連線') || status.includes('同步') ? 'bg-green-500' : 'bg-slate-300'}`}></div>
              <p className="text-[9px] font-bold text-slate-400">{status}</p>
            </div>
          </div>
          <button onClick={() => setView('settings')} className="p-2 text-slate-400 hover:bg-slate-50 rounded-full">
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          </button>
        </header>
        <main className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50 relative">{children}</main>
        <nav className="shrink-0 bg-white border-t border-slate-100 grid grid-cols-5 items-end pb-6 pt-2 px-2 z-30 safe-area-pb shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
          <NavBtn active={activeView === 'dashboard'} onClick={() => setView('dashboard')} icon="home" label="主頁" />
          <NavBtn active={activeView === 'trends'} onClick={() => setView('trends')} icon="chart" label="統計" />
          <div className="flex justify-center -mt-12 relative z-10 pointer-events-none">
            <button onClick={() => setView('add')} className="pointer-events-auto flex flex-col items-center group active:scale-95 transition-transform">
              <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-blue-200 border-[6px] border-white ring-1 ring-slate-100">
                <span className="text-2xl">+</span>
              </div>
              <span className="text-[10px] font-bold text-blue-600 mt-1">紀錄</span>
            </button>
          </div>
          <NavBtn active={activeView === 'calendar'} onClick={() => setView('calendar')} icon="calendar" label="日曆" />
          <NavBtn active={activeView === 'friends'} onClick={() => setView('friends')} icon="users" label="好友" />
        </nav>
      </div>
    );

    const NavBtn = ({ active, onClick, icon, label }) => {
      const icons = {
        home: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
        chart: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
        calendar: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
        users: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
      };
      return (
        <button onClick={onClick} className={`flex flex-col items-center gap-1 py-2 transition-all ${active ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
          <div className="h-6 flex items-center justify-center">{icons[icon]}</div>
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      );
    };

    const Dashboard = ({ logs, onEdit, setView }) => {
      // Logic: Only calculate stats for COMPLETED logs
      const completedLogs = logs.filter(l => l.status === 'completed');
      
      const sorted = [...logs].sort((a,b) => {
        // Sort: Plans (Future -> Far Future) then Completed (New -> Old) ? 
        // Or just straightforward Date Descending? 
        // Let's do Date Descending (Newest first) for simplicity in list
        return new Date(b.date) - new Date(a.date);
      });

      const now = new Date();
      const thisWeekCount = completedLogs.filter(l => {
        const d = new Date(l.date.replace(/-/g, '/'));
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - now.getDay());
        startOfWeek.setHours(0,0,0,0);
        return d >= startOfWeek;
      }).length;
      
      // Mood logic
      const last5 = completedLogs.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
      const moodMap = { '🤩': 5, '😊': 4, '😐': 3, '😫': 2, '😡': 1 };
      let moodText = '暫無';
      if(last5.length > 0) {
        const total = last5.reduce((acc, l) => acc + (moodMap[l.mood] || 3), 0);
        const avg = total / last5.length;
        if (avg >= 4.5) moodText = '🤩 絕佳';
        else if (avg >= 3.5) moodText = '😊 不錯';
        else if (avg >= 2.5) moodText = '😐 普通';
        else if (avg >= 1.5) moodText = '😫 疲累';
        else moodText = '😡 糟糕';
      }

      const activeCategories = [...new Set(completedLogs.map(l => l.category))];
      const defaults = ['Gym', '羽毛球', '排球'];
      const displayCats = [...defaults, ...activeCategories.filter(c => !defaults.includes(c))].slice(0, 3); // Just show top 3 slots

      return (
        <div className="p-6 space-y-6 animate-slide-up pb-24">
          {/* 1. AI Coach Section */}
          <SmartCoach logs={logs} />

          {/* 2. Quick Stats Row */}
          <div className="grid grid-cols-2 gap-4">
             <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between h-28">
               <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">本週完成</div>
               <div className="text-3xl font-black text-slate-800">{thisWeekCount}<span className="text-sm font-bold text-slate-400 ml-1">次</span></div>
             </div>
             <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between h-28">
               <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">近期狀態</div>
               <div className="text-lg font-black text-slate-800">{moodText}</div>
             </div>
          </div>

          {/* 3. List */}
          <div>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">最近行程</h3>
              <button onClick={()=>setView('calendar')} className="text-xs font-bold text-blue-600">查看全部</button>
            </div>
            <div className="space-y-3">
              {sorted.slice(0, 10).map(l => {
                const c = CATEGORIES.find(x=>x.value===l.category) || CATEGORIES[5];
                const isPlanned = l.status === 'planned';
                
                return (
                  <div 
                    key={l.id} 
                    onClick={()=>onEdit(l)} 
                    className={`
                      relative p-4 rounded-3xl border flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer
                      ${isPlanned 
                        ? 'bg-slate-50 border-dashed border-slate-300 opacity-80' 
                        : 'bg-white shadow-sm border-slate-100'
                      }
                    `}
                  >
                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner ${isPlanned ? 'bg-slate-200 text-slate-400' : `${c.color} text-white`}`}>
                      {c.icon}
                    </div>
                    <div className="flex-1">
                      <div className="flex justify-between items-start">
                         <h4 className={`font-bold text-sm ${isPlanned ? 'text-slate-500' : 'text-slate-800'}`}>{l.subcategory}</h4>
                         {isPlanned && <span className="text-[9px] font-bold bg-slate-200 text-slate-500 px-2 py-0.5 rounded-full">計劃中</span>}
                      </div>
                      
                      <div className="text-[10px] font-bold text-slate-400 uppercase mt-0.5 flex flex-wrap gap-2 items-center">
                        <span>{l.date.replace(/-/g, '/')}</span>
                        {l.startTime && <span>• {l.startTime}-{l.endTime}</span>}
                        <span>• {l.durationMinutes} min</span>
                      </div>
                    </div>
                  </div>
                )
              })}
              {logs.length===0 && <div className="text-center py-10 text-slate-400 text-sm">暫無紀錄，按 + 開始</div>}
            </div>
          </div>
        </div>
      )
    };

    const Trends = ({ logs }) => {
      // Filter for COMPLETED only
      const completed = logs.filter(l => l.status === 'completed');

      const last7 = Array.from({length:7}).map((_,i) => {
        const d = new Date(); 
        d.setDate(d.getDate() - (6-i));
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const mins = completed.filter(l=>l.date === dateStr).reduce((a,b)=>a+b.durationMinutes,0);
        return { day: d.getDate(), mins, isToday: i===6 };
      });
      const maxWeekly = Math.max(...last7.map(d=>d.mins), 60);

      const breakdown = CATEGORIES.map(cat => {
        const catLogs = completed.filter(l => l.category === cat.value);
        const totalMinutes = catLogs.reduce((a,b)=>a+b.durationMinutes, 0);
        return { ...cat, totalMinutes, count: catLogs.length, hours: (totalMinutes/60).toFixed(1) };
      }).filter(c => c.totalMinutes > 0).sort((a,b) => b.totalMinutes - a.totalMinutes);

      const totalMins = completed.reduce((a,b) => a + b.durationMinutes, 0);

      return (
        <div className="p-6 space-y-8 animate-slide-up pb-24">
          <section className="grid grid-cols-2 gap-3">
             <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                <div className="text-[10px] font-black text-slate-400 uppercase">總時數</div>
                <div className="text-2xl font-black text-slate-800 mt-1">{(totalMins/60).toFixed(1)}<span className="text-xs text-slate-400 ml-1">hr</span></div>
             </div>
             <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                <div className="text-[10px] font-black text-slate-400 uppercase">完成次數</div>
                <div className="text-2xl font-black text-slate-800 mt-1">{completed.length}<span className="text-xs text-slate-400 ml-1">次</span></div>
             </div>
          </section>

          <section>
            <h3 className="text-sm font-black text-slate-800 mb-4 uppercase tracking-widest">過去 7 天趨勢</h3>
            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 h-48 flex items-end justify-between gap-2">
               {last7.map((d,i) => (
                 <div key={i} className="flex-1 flex flex-col items-center gap-1 h-full justify-end group">
                   <div style={{height: `${d.mins > 0 ? Math.max((d.mins/maxWeekly)*100, 5) : 2}%`}} className={`w-full max-w-[12px] rounded-full min-h-[4px] transition-all duration-500 ${d.isToday ? 'bg-blue-500' : (d.mins > 0 ? 'bg-blue-200' : 'bg-slate-100')}`}></div>
                   <span className="text-[10px] font-bold text-slate-400 mt-1">{d.day}</span>
                 </div>
               ))}
            </div>
          </section>

          {breakdown.length > 0 && (
             <section>
               <h3 className="text-sm font-black text-slate-800 mb-4 uppercase tracking-widest">運動項目分佈</h3>
               <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                 {breakdown.map((item) => (
                   <div key={item.value}>
                     <div className="flex justify-between items-end mb-1">
                       <div className="flex items-center gap-2">
                         <span className="text-lg">{item.icon}</span>
                         <span className="text-xs font-bold text-slate-700">{item.value}</span>
                       </div>
                       <div className="text-[10px] font-bold text-slate-400">{item.count} 次 • {item.hours} hr</div>
                     </div>
                     <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                       <div className={`h-full ${item.color}`} style={{width: `${(item.totalMinutes/totalMins)*100}%`}}></div>
                     </div>
                   </div>
                 ))}
               </div>
             </section>
          )}
        </div>
      );
    }

    const Calendar = ({ logs, onEdit }) => {
      const [date, setDate] = useState(new Date());
      const [sel, setSel] = useState(getLocalTodayString());

      const daysInMonth = new Date(date.getFullYear(), date.getMonth()+1, 0).getDate();
      const firstDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
      const days = Array(firstDay).fill(null).concat([...Array(daysInMonth).keys()].map(i=>i+1));
      
      const dayLogs = logs.filter(l=>l.date === sel);

      return (
        <div className="p-6 animate-slide-up pb-24">
           <div className="flex justify-between items-center mb-6">
             <h2 className="text-xl font-black text-slate-800">{date.toLocaleString('zh-HK',{month:'long',year:'numeric'})}</h2>
             <div className="flex gap-2">
               <button onClick={()=>setDate(new Date(date.getFullYear(),date.getMonth()-1,1))} className="p-2 border rounded-lg text-slate-500">←</button>
               <button onClick={()=>setDate(new Date(date.getFullYear(),date.getMonth()+1,1))} className="p-2 border rounded-lg text-slate-500">→</button>
             </div>
           </div>

           <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-7 gap-1">
             {['日','一','二','三','四','五','六'].map(d=><div key={d} className="text-center text-[10px] font-black text-slate-400 py-1">{d}</div>)}
             {days.map((d,i) => {
               if(!d) return <div key={i}></div>;
               const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
               
               const logsForDay = logs.filter(l=>l.date === ds);
               const hasCompleted = logsForDay.some(l => l.status === 'completed');
               const hasPlanned = logsForDay.some(l => l.status === 'planned');

               return (
                 <button key={i} onClick={()=>setSel(ds)} className={`aspect-square rounded-xl flex flex-col items-center justify-center relative transition-all ${sel===ds ? 'bg-slate-800 text-white shadow-lg scale-105' : 'hover:bg-slate-50 text-slate-700'}`}>
                   <span className="text-xs font-bold">{d}</span>
                   <div className="flex gap-0.5 mt-1">
                     {hasCompleted && <div className="w-1.5 h-1.5 rounded-full bg-blue-500"></div>}
                     {hasPlanned && <div className="w-1.5 h-1.5 rounded-full border border-blue-400"></div>}
                   </div>
                 </button>
               )
             })}
           </div>

           <div className="mt-6 space-y-3">
             <div className="flex justify-between items-center px-1">
                <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest">{sel}</h3>
                <span className="text-[10px] font-bold text-slate-400">{dayLogs.length} 筆行程</span>
             </div>
             {dayLogs.map(l => (
               <div key={l.id} onClick={()=>onEdit(l)} className={`p-4 rounded-3xl border flex items-center gap-4 cursor-pointer ${l.status==='planned' ? 'bg-slate-50 border-dashed border-slate-300' : 'bg-white border-slate-100'}`}>
                 <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg ${l.status==='planned'?'bg-slate-200 text-slate-500':`${CATEGORIES.find(c=>c.value===l.category)?.color} text-white`}`}>
                    {CATEGORIES.find(c=>c.value===l.category)?.icon}
                 </div>
                 <div className="flex-1">
                    <div className="font-bold text-slate-800 text-sm">{l.subcategory}</div>
                    <div className="text-[10px] text-slate-400">
                        {l.status === 'planned' ? '計劃中' : '已完成'} • {l.startTime}-{l.endTime}
                    </div>
                 </div>
               </div>
             ))}
             {dayLogs.length === 0 && <div className="text-center py-8 text-slate-400 text-xs">本日無行程</div>}
           </div>
        </div>
      )
    }

    const Form = ({ onSave, onCancel, onDelete, initData, allLogs }) => {
      const [data, setData] = useState(() => {
        const defaults = { 
            category: 'Gym', 
            subcategory: '重量訓練', 
            date: getLocalTodayString(),
            startTime: '18:00',
            endTime: '19:00',
            durationMinutes: 60,
            status: 'completed', // 'planned' or 'completed'
            effort: 5, 
            performance: 7, 
            mood: '😊', 
            friends: [] 
        };
        
        if (!initData) return defaults;
        return { ...defaults, ...initData };
      });

      const [friendInput, setFriendInput] = useState('');

      // Auto-update status based on date
      useEffect(() => {
        if (!initData) { // Only auto-switch for new entries
            if (isFutureDate(data.date)) {
                setData(prev => ({ ...prev, status: 'planned' }));
            } else {
                setData(prev => ({ ...prev, status: 'completed' }));
            }
        }
      }, [data.date]);

      // Auto-calc duration
      useEffect(() => {
         const mins = calculateDuration(data.startTime, data.endTime);
         setData(prev => ({ ...prev, durationMinutes: mins }));
      }, [data.startTime, data.endTime]);

      const isPlanned = data.status === 'planned';

      return (
        <div className="p-6 animate-slide-up pb-24 space-y-6">
          <div className="flex justify-between items-center">
             <h2 className="text-2xl font-black">{initData ? (isPlanned ? '編輯計劃' : '編輯紀錄') : (isPlanned ? '新增計劃' : '新增紀錄')}</h2>
             <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center bg-white rounded-full border">✕</button>
          </div>

          <div className="bg-white p-5 rounded-3xl space-y-4 border border-slate-100">
             <div className="grid grid-cols-2 gap-4">
               <div>
                   <label className="text-[10px] font-black text-slate-400 uppercase">日期</label>
                   <input type="date" value={data.date} onChange={e=>setData({...data, date:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900" />
               </div>
               <div>
                   <label className="text-[10px] font-black text-slate-400 uppercase">狀態</label>
                   <select value={data.status} onChange={e=>setData({...data, status:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900">
                       <option value="completed">✅ 已完成</option>
                       <option value="planned">📅 計劃中</option>
                   </select>
               </div>
             </div>

             <div className="grid grid-cols-2 gap-4">
                <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase">開始</label>
                    <input type="time" value={data.startTime} onChange={e=>setData({...data, startTime:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900" />
                </div>
                <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase">結束</label>
                    <input type="time" value={data.endTime} onChange={e=>setData({...data, endTime:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900" />
                </div>
             </div>
             <div className="text-center text-xs text-slate-400 font-bold">
                 共 {Math.floor(data.durationMinutes/60)} 小時 {data.durationMinutes%60} 分鐘
             </div>
          </div>

          <div className="grid grid-cols-3 gap-2">
            {CATEGORIES.map(c => (
              <button key={c.value} onClick={()=>setData({...data, category:c.value, subcategory:c.subcategories[0]})} className={`p-2 rounded-2xl border-2 transition-all ${data.category===c.value ? `border-slate-800 bg-white` : 'border-transparent bg-white opacity-40'}`}>
                <div className="text-2xl">{c.icon}</div>
                <div className="text-[9px] font-bold text-slate-500 mt-1">{c.value}</div>
              </button>
            ))}
          </div>

          <div className="bg-white p-4 rounded-3xl border border-slate-100">
             <label className="text-[10px] font-black text-slate-400 uppercase">項目細節</label>
             <select value={data.subcategory} onChange={e=>setData({...data, subcategory:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-900">
                {CATEGORIES.find(c=>c.value===data.category).subcategories.map(s=><option key={s} value={s}>{s}</option>)}
             </select>
          </div>

          {/* Only show Mood/Effort if NOT planned */}
          {!isPlanned && (
             <div className="space-y-6 animate-fade-in">
                <div className="bg-white p-5 rounded-3xl space-y-4 border border-slate-100">
                    <div>
                    <div className="flex justify-between mb-1">
                        <label className="text-[10px] font-black text-slate-400 uppercase">訓練強度 (RPE)</label>
                        <span className="text-xs font-bold text-slate-600">{data.effort} / 10</span>
                    </div>
                    <input type="range" min="1" max="10" value={data.effort} onChange={e=>setData({...data, effort:Number(e.target.value)})} className="w-full h-8 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                    </div>

                    <div>
                    <div className="flex justify-between mb-1">
                        <label className="text-[10px] font-black text-slate-400 uppercase">狀態表現</label>
                        <span className="text-xs font-bold text-slate-600">{data.performance} / 10</span>
                    </div>
                    <input type="range" min="1" max="10" value={data.performance} onChange={e=>setData({...data, performance:Number(e.target.value)})} className="w-full h-8 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-green-500" />
                    </div>
                </div>

                <div className="bg-white p-5 rounded-3xl border border-slate-100">
                    <label className="text-[10px] font-black text-slate-400 uppercase">訓練心情</label>
                    <div className="flex justify-between mt-2">
                    {['🤩','😊','😐','😫','😡'].map(m => (
                        <button key={m} onClick={()=>setData({...data, mood:m})} className={`text-2xl p-2 rounded-xl transition-all ${data.mood===m ? 'bg-slate-100 scale-125' : 'opacity-50 grayscale'}`}>{m}</button>
                    ))}
                    </div>
                </div>
             </div>
          )}

          <div className="bg-white p-5 rounded-3xl border border-slate-100">
             <label className="text-[10px] font-black text-slate-400 uppercase">同行夥伴</label>
             <div className="flex gap-2 mt-2">
               <input type="text" value={friendInput} onChange={e=>setFriendInput(e.target.value)} placeholder="輸入名字..." className="flex-1 p-3 bg-slate-50 rounded-xl text-sm text-slate-900 font-bold" />
               <button onClick={()=>{const v=friendInput.trim(); if(v&&!data.friends.includes(v)) setData({...data, friends:[...data.friends,v]}); setFriendInput('');}} className="bg-slate-900 text-white px-4 rounded-xl font-bold">+</button>
             </div>
             <div className="flex flex-wrap gap-2 mt-3">{data.friends.map(f=><span key={f} onClick={()=>setData({...data, friends:data.friends.filter(x=>x!==f)})} className="bg-blue-600 text-white px-2 py-1 rounded-lg text-xs font-bold cursor-pointer">{f} ✕</span>)}</div>
          </div>

          <button onClick={()=>onSave({...data, id:initData?.id||Date.now().toString()})} className={`w-full py-4 text-white rounded-2xl font-black shadow-xl ${isPlanned ? 'bg-slate-500' : 'bg-slate-900'}`}>
              {isPlanned ? '📅 儲存計劃' : '✅ 完成紀錄'}
          </button>
          
          {initData && <button onClick={()=>onDelete(initData.id)} className="w-full text-red-500 font-bold text-sm">刪除此項目</button>}
        </div>
      )
    }

    const Settings = ({ user, handleAuth, setView }) => {
       return (
         <div className="p-6 animate-slide-up space-y-6">
           <h2 className="text-2xl font-black text-slate-800">設定</h2>
           <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center gap-4">
             <div className="w-20 h-20 rounded-full bg-slate-100 flex items-center justify-center text-3xl overflow-hidden ring-4 ring-slate-50">
                {user?.photoURL ? <img src={user.photoURL} alt="User" className="w-full h-full object-cover" /> : '👤'}
             </div>
             <div className="text-center">
               <h3 className="font-bold text-lg text-slate-800">{user ? user.displayName : '訪客模式'}</h3>
               <p className="text-xs text-slate-400 font-bold">{user ? user.email : '資料僅儲存於本地'}</p>
             </div>
             <button onClick={handleAuth} className="w-full py-3 rounded-2xl font-bold bg-slate-900 text-white shadow-lg active:scale-95">
                {user ? '登出帳戶' : 'Google 登入 / 備份'}
             </button>
           </div>
           <button onClick={() => setView('dashboard')} className="w-full text-slate-400 text-xs font-bold mt-4">返回主頁</button>
         </div>
       );
    };

    const FriendsView = ({ logs }) => {
      // Only count COMPLETED sessions for friends
      const completed = logs.filter(l => l.status === 'completed');
      
      const friendStats = {};
      completed.forEach(l => {
        if(l.friends) l.friends.forEach(f => {
           if(!friendStats[f]) friendStats[f] = { count: 0, lastDate: l.date };
           friendStats[f].count++;
           if(new Date(l.date) > new Date(friendStats[f].lastDate)) friendStats[f].lastDate = l.date;
        });
      });
      const sorted = Object.entries(friendStats).sort((a,b) => b[1].count - a[1].count);

      return (
        <div className="p-6 animate-slide-up">
           <h2 className="text-2xl font-black text-slate-800 mb-6">好友榜單</h2>
           {sorted.length === 0 ? <p className="text-slate-400 text-sm">還沒有和朋友一起運動的紀錄</p> : 
             <div className="grid grid-cols-2 gap-3">
               {sorted.map(([name, data]) => (
                  <div key={name} className="bg-white p-4 rounded-3xl border border-slate-100 flex flex-col items-center gap-2">
                     <div className="w-12 h-12 rounded-full bg-blue-100 text-blue-500 flex items-center justify-center font-black text-lg">{name[0]}</div>
                     <div className="font-bold text-slate-800">{name}</div>
                     <div className="text-xs text-slate-400 font-bold">{data.count} 次運動</div>
                  </div>
               ))}
             </div>
           }
        </div>
      );
    };

    const App = () => {
      const [view, setView] = useState('dashboard');
      const [logs, setLogs] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch(e) { return []; }
      });
      const [editLog, setEditLog] = useState(null);
      const [user, setUser] = useState(null);
      const [status, setStatus] = useState('初始化...');

      useEffect(() => {
        const fb = initFirebase();
        if(!fb) return;
        
        // Handle Redirect Result
        getRedirectResult(fb.auth).then(res => {
          if(res) { console.log('Redirect Success'); }
        }).catch(err => console.error(err));

        const unsub = onAuthStateChanged(fb.auth, async (u) => {
          setUser(u);
          if (u) {
            setStatus('連線中 (同步資料)...');
            try {
               const docRef = doc(fb.db, "users", u.uid);
               onSnapshot(docRef, (docSnap) => {
                 if (docSnap.exists() && docSnap.data().logs) {
                    const cloudLogs = docSnap.data().logs;
                    setLogs(cloudLogs);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudLogs));
                    setStatus('已連線');
                 } else {
                    // First time sync: push local to cloud
                    const local = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                    setDoc(docRef, { logs: local, updatedAt: new Date().toISOString() });
                    setStatus('已連線 (初始化)');
                 }
               });
            } catch(e) { console.error(e); setStatus('連線錯誤'); }
          } else {
             setStatus('本地模式');
          }
        });
        return () => unsub();
      }, []);

      const updateLogs = async (newLogs) => {
        setLogs(newLogs);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newLogs));
        if (user) {
          const fb = initFirebase();
          await setDoc(doc(fb.db, "users", user.uid), { logs: newLogs, updatedAt: new Date().toISOString() }, { merge: true });
        }
      };

      const handleSave = (log) => {
        const updated = editLog ? logs.map(l => l.id === log.id ? log : l) : [log, ...logs];
        updateLogs(updated);
        setEditLog(null);
        setView('dashboard');
      };

      const handleDelete = (id) => {
        updateLogs(logs.filter(l => l.id !== id));
        setEditLog(null);
        setView('dashboard');
      };

      const handleAuth = async () => {
        const fb = initFirebase();
        if (user) await signOut(fb.auth);
        else {
           // Simple mobile detection for redirect vs popup
           const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
           const provider = new GoogleAuthProvider();
           if(isMobile) signInWithRedirect(fb.auth, provider);
           else signInWithPopup(fb.auth, provider);
        }
      };

      return (
        <Layout activeView={view} setView={setView} user={user} status={status}>
          {view === 'dashboard' && <Dashboard logs={logs} setView={setView} onEdit={(l)=>{setEditLog(l); setView('add');}} />}
          {view === 'trends' && <Trends logs={logs} />}
          {view === 'calendar' && <Calendar logs={logs} onEdit={(l)=>{setEditLog(l); setView('add');}} />}
          {view === 'friends' && <FriendsView logs={logs} />}
          {view === 'add' && <Form onSave={handleSave} onCancel={()=>{setEditLog(null); setView('dashboard');}} onDelete={handleDelete} initData={editLog} allLogs={logs} />}
          {view === 'settings' && <Settings user={user} handleAuth={handleAuth} setView={setView} />}
        </Layout>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
