<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FitTrack 運動日常</title>
  <meta name="description" content="一個全功能的運動追蹤應用程式">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    .safe-area-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }
  </style>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Import Map: FIXED & CLEANED -->
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "firebase/app": "https://esm.sh/firebase@10.12.0/app",
    "firebase/auth": "https://esm.sh/firebase@10.12.0/auth",
    "firebase/firestore": "https://esm.sh/firebase@10.12.0/firestore",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>

  <!-- Application Logic -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import ReactDOM from 'react-dom/client';
    import { initializeApp, getApps, getApp } from 'firebase/app';
    import { getFirestore, doc, setDoc, onSnapshot } from 'firebase/firestore';
    import { getAuth, onAuthStateChanged, signInWithPopup, signOut, GoogleAuthProvider } from 'firebase/auth';

    // --- CONFIG ---
    const CATEGORIES = [
      { value: 'Gym', subcategories: ['功能性訓練', '重量訓練', '帶氧運動', 'HIIT', '伸展'], color: 'bg-blue-500', icon: '💪' },
      { value: '羽毛球', subcategories: ['友誼賽', '技術練習', '正式比賽', '單打', '雙打'], color: 'bg-green-500', icon: '🏸' },
      { value: '排球', subcategories: ['打比賽', '隊訓', '街場', '技術訓練'], color: 'bg-orange-500', icon: '🏐' },
      { value: '跑步', subcategories: ['慢跑', '長跑', '衝刺練習', '馬拉松訓練'], color: 'bg-red-500', icon: '🏃' },
      { value: '游泳', subcategories: ['自由式', '蛙式', '蝶式', '背泳'], color: 'bg-cyan-500', icon: '🏊' },
      { value: '瑜伽', subcategories: ['哈達瑜伽', '流瑜伽', '陰瑜伽', '普拉提'], color: 'bg-purple-500', icon: '🧘' },
      { value: '其他', subcategories: ['自定義項目'], color: 'bg-slate-500', icon: '✨' },
    ];

    const firebaseConfig = {
      apiKey: "AIzaSyCxrAn6x69Ki4c-MTrpBhyGnX2XFKW2f4k",
      authDomain: "fittracker-chunlam252.firebaseapp.com",
      projectId: "fittracker-chunlam252",
      storageBucket: "fittracker-chunlam252.firebasestorage.app",
      messagingSenderId: "629880531604",
      appId: "1:629880531604:web:76fd44292a79fbdad86281"
    };

    const STORAGE_KEY = 'fittrack_logs_v1';

    // --- SERVICE ---
    let db, auth, googleProvider;

    const initFirebase = () => {
      try {
        const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        googleProvider = new GoogleAuthProvider();
        return { auth, db, googleProvider };
      } catch (e) {
        console.error("Firebase Error:", e);
        return null;
      }
    };

    // --- COMPONENTS ---

    const Layout = ({ children, activeView, setView, user, handleAuth, status }) => (
      <div className="flex flex-col h-[100dvh] max-w-md mx-auto bg-white shadow-2xl relative overflow-hidden border-x border-slate-100">
        <header className="px-6 py-4 bg-white/90 backdrop-blur border-b border-slate-100 z-30 flex justify-between items-center shrink-0">
          <div>
            <h1 className="text-xl font-black text-slate-800 tracking-tight flex items-center gap-2">
              FitTrack <span className="text-xs font-normal text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">v3.0</span>
            </h1>
            <div className="flex items-center gap-1.5 mt-1">
              <span className={`w-2 h-2 rounded-full ${status.includes('同步') ? 'bg-green-500 animate-pulse' : 'bg-slate-300'}`}></span>
              <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">{status}</p>
            </div>
          </div>
          <button onClick={handleAuth} className={`p-2 rounded-full border transition-all active:scale-95 ${user ? 'border-blue-100 bg-blue-50' : 'border-slate-200 bg-white'}`}>
            {user?.photoURL ? <img src={user.photoURL} className="w-8 h-8 rounded-full" alt="User" /> : <div className="w-8 h-8 flex items-center justify-center text-slate-400">👤</div>}
          </button>
        </header>

        <main className="flex-1 overflow-y-auto custom-scrollbar bg-slate-50 relative">
          {children}
        </main>

        <nav className="shrink-0 bg-white border-t border-slate-100 flex justify-around items-end pb-6 pt-3 px-2 z-30 safe-area-pb shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
          <NavBtn active={activeView === 'dashboard'} onClick={() => setView('dashboard')} icon="home" label="主頁" />
          <NavBtn active={activeView === 'trends'} onClick={() => setView('trends')} icon="chart" label="趨勢" />
          <button onClick={() => setView('add')} className="flex flex-col items-center -mt-10 group active:scale-95 transition-transform">
            <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-blue-200 border-[6px] border-white ring-1 ring-slate-100">
              <span className="text-2xl">+</span>
            </div>
            <span className="text-[10px] font-bold text-blue-600 mt-1">紀錄</span>
          </button>
          <NavBtn active={activeView === 'calendar'} onClick={() => setView('calendar')} icon="calendar" label="日曆" />
          <NavBtn active={false} onClick={() => alert('即將推出')} icon="menu" label="更多" />
        </nav>
      </div>
    );

    const NavBtn = ({ active, onClick, icon, label }) => {
      const icons = {
        home: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
        chart: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
        calendar: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
        menu: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
      };
      return (
        <button onClick={onClick} className={`flex flex-col items-center gap-1 flex-1 py-2 transition-all ${active ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
          {icons[icon]}
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      );
    };

    const Dashboard = ({ logs, onEdit, setView }) => {
      const sorted = [...logs].sort((a,b) => new Date(b.date) - new Date(a.date));
      const last = sorted[0];
      const daysSince = last ? Math.floor((new Date() - new Date(last.date))/(86400000)) : '-';
      
      return (
        <div className="p-6 space-y-6 animate-slide-up">
          <div className="bg-slate-900 rounded-[2rem] p-6 text-white shadow-xl shadow-slate-200 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full blur-[60px] opacity-20"></div>
            <div className="relative z-10 grid grid-cols-2 gap-8">
              <div>
                <div className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">上次運動</div>
                <div className="text-4xl font-black">{daysSince}<span className="text-sm text-slate-500 ml-1">天前</span></div>
              </div>
              <div className="border-l border-white/10 pl-8">
                <div className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">總紀錄</div>
                <div className="text-4xl font-black text-blue-400">{logs.length}</div>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-3">
            {['Gym','羽毛球','跑步'].map(cat => {
              const c = CATEGORIES.find(x=>x.value===cat);
              const has = logs.find(x=>x.category===cat);
              return (
                <div key={cat} className="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center gap-1">
                  <span className="text-2xl">{c.icon}</span>
                  <span className="text-[10px] font-bold text-slate-500">{cat}</span>
                  <span className={`text-[10px] font-black ${has ? 'text-green-500' : 'text-slate-300'}`}>{has ? '活躍' : '無紀錄'}</span>
                </div>
              )
            })}
          </div>

          <div>
             <div className="flex justify-between items-center mb-4">
              <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">最近活動</h3>
              <button onClick={()=>setView('calendar')} className="text-xs font-bold text-blue-600">查看全部</button>
            </div>
            <div className="space-y-3">
              {sorted.slice(0,5).map(l => {
                const c = CATEGORIES.find(x=>x.value===l.category);
                return (
                  <div key={l.id} onClick={()=>onEdit(l)} className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 active:scale-[0.98] transition-transform">
                    <div className={`w-12 h-12 rounded-2xl ${c?.color} flex items-center justify-center text-xl text-white shadow-inner`}>{c?.icon}</div>
                    <div className="flex-1">
                      <h4 className="font-bold text-slate-800 text-sm">{l.subcategory}</h4>
                      <div className="text-[10px] font-bold text-slate-400 uppercase mt-0.5">{new Date(l.date).toLocaleDateString()} • {l.durationMinutes} min</div>
                    </div>
                  </div>
                )
              })}
              {logs.length===0 && <div className="text-center py-10 text-slate-400 text-sm">暫無紀錄</div>}
            </div>
          </div>
        </div>
      )
    };

    const Trends = ({ logs }) => {
      const last7 = Array.from({length:7}).map((_,i) => {
        const d = new Date(); d.setDate(d.getDate() - (6-i));
        const dateStr = d.toISOString().split('T')[0];
        const mins = logs.filter(l=>l.date.startsWith(dateStr)).reduce((a,b)=>a+b.durationMinutes,0);
        return { day: d.getDate(), mins, isToday: i===6 };
      });
      const max = Math.max(...last7.map(d=>d.mins), 60);

      return (
        <div className="p-6 space-y-6 animate-slide-up">
          <h3 className="text-lg font-black text-slate-800">每週活動量</h3>
          <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 h-48 flex items-end justify-between gap-2">
             {last7.map((d,i) => (
               <div key={i} className="flex-1 flex flex-col items-center gap-2 h-full justify-end">
                 <div style={{height: `${(d.mins/max)*100}%`}} className={`w-full max-w-[16px] rounded-full min-h-[6px] transition-all ${d.isToday ? 'bg-blue-500 shadow-lg shadow-blue-200' : 'bg-slate-100'}`}></div>
                 <span className="text-[10px] font-bold text-slate-400">{d.day}</span>
               </div>
             ))}
          </div>
          <div className="bg-blue-600 rounded-3xl p-5 text-white shadow-lg shadow-blue-100">
             <div className="text-[10px] font-black uppercase opacity-60">總時數</div>
             <div className="text-3xl font-black mt-1">{(logs.reduce((a,b)=>a+b.durationMinutes,0)/60).toFixed(1)}<span className="text-sm ml-1">h</span></div>
          </div>
        </div>
      );
    }

    const Calendar = ({ logs, onEdit }) => {
      const [date, setDate] = useState(new Date());
      const [sel, setSel] = useState(new Date().toISOString().split('T')[0]);
      
      const year = date.getFullYear();
      const month = date.getMonth();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const days = Array(firstDay).fill(null).concat([...Array(daysInMonth).keys()].map(i=>i+1));
      
      const dayLogs = logs.filter(l=>l.date.startsWith(sel));

      return (
        <div className="p-6 animate-slide-up pb-24">
           <div className="flex justify-between items-center mb-6">
             <h2 className="text-xl font-black text-slate-800">{date.toLocaleString('default',{month:'long',year:'numeric'})}</h2>
             <div className="flex gap-2">
               <button onClick={()=>setDate(new Date(year,month-1,1))} className="p-2 border rounded-lg text-slate-500">←</button>
               <button onClick={()=>setDate(new Date(year,month+1,1))} className="p-2 border rounded-lg text-slate-500">→</button>
             </div>
           </div>
           <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 mb-6">
             <div className="grid grid-cols-7 text-center mb-2 text-[10px] font-black text-slate-400">
               {['日','一','二','三','四','五','六'].map(d=><div key={d}>{d}</div>)}
             </div>
             <div className="grid grid-cols-7 gap-1">
               {days.map((d,i) => {
                 if(!d) return <div key={i}></div>;
                 const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                 const has = logs.some(l=>l.date.startsWith(ds));
                 const isSel = sel === ds;
                 return (
                   <button key={i} onClick={()=>setSel(ds)} className={`aspect-square rounded-xl flex flex-col items-center justify-center relative ${isSel ? 'bg-slate-800 text-white shadow-lg' : 'hover:bg-slate-50 text-slate-700'}`}>
                     <span className="text-xs font-bold">{d}</span>
                     {has && <div className={`w-1 h-1 rounded-full mt-1 ${isSel?'bg-blue-400':'bg-blue-500'}`}></div>}
                   </button>
                 )
               })}
             </div>
           </div>
           <div className="space-y-3">
             {dayLogs.map(l => {
               const c = CATEGORIES.find(x=>x.value===l.category);
               return (
                 <div key={l.id} onClick={()=>onEdit(l)} className="bg-white p-4 rounded-3xl border border-slate-100 flex items-center gap-4">
                   <div className={`w-10 h-10 rounded-xl ${c?.color} flex items-center justify-center text-lg text-white`}>{c?.icon}</div>
                   <div><div className="font-bold text-slate-800 text-sm">{l.subcategory}</div><div className="text-[10px] text-slate-400">{l.durationMinutes} min</div></div>
                 </div>
               )
             })}
             {dayLogs.length===0 && <div className="text-center py-6 text-slate-400 text-sm border-dashed border rounded-3xl">本日休息 💤</div>}
           </div>
        </div>
      )
    }

    const Form = ({ onSave, onCancel, initData }) => {
      const [data, setData] = useState(initData || {
        category: 'Gym', subcategory: '功能性訓練', date: new Date().toISOString().split('T')[0], durationMinutes: 60, effort: 5, mood: '😊', notes: ''
      });
      const cfg = CATEGORIES.find(c=>c.value===data.category);

      useEffect(() => {
        const c = CATEGORIES.find(x=>x.value===data.category);
        if(c && !c.subcategories.includes(data.subcategory)) setData(d=>({...d, subcategory:c.subcategories[0]}));
      }, [data.category]);

      return (
        <div className="p-6 h-full flex flex-col bg-slate-50 animate-slide-up">
          <div className="flex justify-between items-center mb-6">
             <h2 className="text-2xl font-black text-slate-800">{initData?'編輯':'新增'}</h2>
             <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center bg-white rounded-full border shadow-sm">✕</button>
          </div>
          <div className="space-y-6 pb-24">
            <div className="grid grid-cols-4 gap-2">
              {CATEGORIES.map(c => (
                <button key={c.value} onClick={()=>setData({...data, category:c.value})} className={`flex flex-col items-center p-2 rounded-2xl border-2 transition-all ${data.category===c.value ? 'border-slate-800 bg-white' : 'border-transparent bg-white opacity-50'}`}>
                  <span className="text-2xl">{c.icon}</span>
                </button>
              ))}
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
               <div><label className="text-[10px] font-black text-slate-400 uppercase">項目</label><select value={data.subcategory} onChange={e=>setData({...data, subcategory:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-700 outline-none">{cfg.subcategories.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
               <div className="grid grid-cols-2 gap-4">
                 <div><label className="text-[10px] font-black text-slate-400 uppercase">日期</label><input type="date" value={data.date} onChange={e=>setData({...data, date:e.target.value})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-700 outline-none" /></div>
                 <div><label className="text-[10px] font-black text-slate-400 uppercase">時長</label><input type="number" value={data.durationMinutes} onChange={e=>setData({...data, durationMinutes:Number(e.target.value)})} className="w-full mt-1 p-3 bg-slate-50 rounded-xl font-bold text-slate-700 outline-none" /></div>
               </div>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
               <div className="flex justify-between"><label className="text-[10px] font-black text-slate-400 uppercase">強度</label><span className="text-xs font-black text-blue-600">{data.effort}/10</span></div>
               <input type="range" min="1" max="10" value={data.effort} onChange={e=>setData({...data, effort:Number(e.target.value)})} className="w-full mt-2 h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-slate-800" />
            </div>
            <button onClick={()=>onSave({...data, id:initData?.id||Date.now().toString(), date:new Date(data.date).toISOString()})} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black shadow-xl shadow-slate-300 active:scale-95 transition-transform">儲存紀錄</button>
          </div>
        </div>
      );
    }

    // --- APP ROOT ---
    const App = () => {
      const [view, setView] = useState('dashboard');
      const [logs, setLogs] = useState([]);
      const [editLog, setEditLog] = useState(null);
      const [user, setUser] = useState(null);
      const [status, setStatus] = useState('初始化');

      // Init Firebase
      useEffect(() => {
        const fb = initFirebase();
        if(fb) {
          const { auth, db } = fb;
          onAuthStateChanged(auth, (u) => {
            setUser(u);
            // Load local first
            const local = localStorage.getItem(STORAGE_KEY);
            if(local) setLogs(JSON.parse(local));
            
            if(u) {
              setStatus('連線中...');
              onSnapshot(doc(db, "users", u.uid), (doc) => {
                if(doc.exists() && doc.data().logs) {
                  setLogs(doc.data().logs);
                  localStorage.setItem(STORAGE_KEY, JSON.stringify(doc.data().logs));
                  setStatus('已同步');
                } else {
                  setStatus('已連線');
                }
              });
            } else {
              setStatus('本地模式');
            }
          });
        } else {
          setStatus('離線模式');
        }
      }, []);

      const save = (log) => {
        const newLogs = editLog ? logs.map(l=>l.id===log.id?log:l) : [log, ...logs];
        setLogs(newLogs);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newLogs));
        if(user) {
          const fb = initFirebase();
          if(fb) setDoc(doc(fb.db, "users", user.uid), { logs: newLogs, updatedAt: new Date().toISOString() }, { merge: true });
        }
        setEditLog(null);
        setView('dashboard');
      };

      const handleAuth = async () => {
        const fb = initFirebase();
        if(!fb) return;
        if(user) await signOut(fb.auth);
        else await signInWithPopup(fb.auth, fb.googleProvider);
      }

      return (
        <Layout activeView={view} setView={setView} user={user} handleAuth={handleAuth} status={status}>
          {view === 'dashboard' && <Dashboard logs={logs} setView={setView} onEdit={(l)=>{setEditLog(l); setView('add');}} />}
          {view === 'trends' && <Trends logs={logs} />}
          {view === 'calendar' && <Calendar logs={logs} onEdit={(l)=>{setEditLog(l); setView('add');}} />}
          {view === 'add' && <Form onSave={save} onCancel={()=>{setEditLog(null); setView('dashboard');}} initData={editLog} />}
        </Layout>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
